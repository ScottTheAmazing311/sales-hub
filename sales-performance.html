<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Dashboard — Revenue Kitchen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f4f0e6;
            --card: #ffffff;
            --card-border: #e5e5e5;
            --foreground: #0a0a0a;
            --muted: #f5f5f5;
            --muted-fg: #737373;
            --primary: #07374F;
            --primary-fg: #fafafa;
            --accent: #eaff6a;
            --accent-warm: #eedc82;
            --destructive: #c0392b;
            --success: #22c55e;
            --blue: #3c94d1;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--foreground); line-height: 1.5; }

        /* ── Top bar ── */
        .topbar {
            background: var(--primary);
            padding: 0.75rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar a {
            color: rgba(255,255,255,0.5); text-decoration: none;
            font-size: 0.8rem; font-weight: 500;
            display: inline-flex; align-items: center; gap: 6px;
            transition: color 0.2s;
        }
        .topbar a:hover { color: #fff; }
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.35);
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ── Dashboard container ── */
        .dash { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

        .dash-header { margin-bottom: 1.5rem; }
        .dash-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--foreground); }
        .dash-header p { font-size: 0.85rem; color: var(--muted-fg); margin-top: 2px; }

        /* ── Tabs ── */
        .tabs {
            display: inline-flex; border: 1px solid var(--card-border);
            border-radius: 8px; background: var(--muted); padding: 3px; margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.45rem 1rem; border: none; background: none;
            font-family: inherit; font-size: 0.8rem; font-weight: 500;
            color: var(--muted-fg); border-radius: 6px; cursor: pointer;
            transition: all 0.15s;
        }
        .tab-btn:hover { color: var(--foreground); }
        .tab-btn.active { background: var(--card); color: var(--foreground); box-shadow: var(--shadow); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Card ── */
        .card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: var(--radius); box-shadow: var(--shadow);
        }
        .card-header { padding: 1.25rem 1.5rem 0; }
        .card-header-row { display: flex; align-items: flex-start; justify-content: space-between; }
        .card-title { font-size: 0.85rem; font-weight: 600; color: var(--foreground); }
        .card-desc { font-size: 0.78rem; color: var(--muted-fg); margin-top: 2px; }
        .card-icon { color: var(--muted-fg); }
        .card-icon svg { width: 16px; height: 16px; }
        .card-content { padding: 1rem 1.5rem 1.5rem; }

        /* ── Stat cards ── */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--foreground); line-height: 1.2; margin-top: 0.25rem; }
        .stat-change { font-size: 0.75rem; color: var(--muted-fg); margin-top: 2px; }
        .stat-change .up { color: var(--success); font-weight: 600; }
        .stat-change .down { color: var(--destructive); font-weight: 600; }

        /* ── Chart grid ── */
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .chart-full { margin-bottom: 1.5rem; }
        .chart-wrap { position: relative; width: 100%; height: 300px; }
        .chart-wrap canvas { display: block; }

        /* ── Table inside card ── */
        .dtable { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .dtable thead th {
            text-align: left; font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--muted-fg); padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--card-border);
        }
        .dtable tbody td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f0f0f0; }
        .dtable tbody tr:last-child td { border-bottom: none; }
        .dtable .mono { font-variant-numeric: tabular-nums; font-weight: 600; }
        .dtable .muted { color: var(--muted-fg); }
        .dtable .total-row td { font-weight: 700; border-top: 2px solid var(--primary); background: rgba(234,255,106,0.08); }
        .dtable-lg { font-size: 0.95rem; }
        .dtable-lg thead th { font-size: 0.78rem; padding: 0.65rem 1rem; }
        .dtable-lg tbody td { padding: 0.75rem 1rem; }
        .dtable .up { color: var(--success); font-weight: 600; }
        .dtable .down { color: var(--destructive); font-weight: 600; }

        /* ── Loading ── */
        .loading { text-align: center; padding: 4rem; color: var(--muted-fg); font-size: 0.85rem; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .dash { padding: 1rem; }
            .stat-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
            .stat-value { font-size: 1.3rem; }
            .card-content { padding: 0.75rem 1rem 1rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="index.html">&larr; Revenue Kitchen</a>
    <span class="live-badge"><span class="live-dot"></span> Live from Google Sheets</span>
</div>

<div class="dash">
    <div class="dash-header">
        <h1>Performance Dashboard</h1>
        <p id="dash-subtitle">Loading&hellip;</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="sales">Sales</button>
        <button class="tab-btn" data-tab="marketing">Marketing</button>
    </div>

    <div class="tab-panel active" id="tab-sales">
        <div class="loading">Loading sales data&hellip;</div>
    </div>
    <div class="tab-panel" id="tab-marketing">
        <div class="loading">Loading marketing data&hellip;</div>
    </div>
</div>

<script>
(function() {
    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-panel').forEach(function(c) { c.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    var SHEET_ID = '18WMXkoKVY-JiWvPMt6e06fljsufO4YziLropqidkYek';
    var COLORS = {
        primary: '#07374F',
        primaryLight: 'rgba(7,55,79,0.7)',
        blue: '#3c94d1',
        blueLight: 'rgba(60,148,209,0.15)',
        accent: '#eaff6a',
        success: '#22c55e',
        destructive: '#c0392b',
        muted: '#e5e5e5',
        warmYellow: '#eedc82'
    };
    var BAR_COLORS = [COLORS.primary, COLORS.blue, '#22c55e', '#f97316', '#8b5cf6', '#ec4899'];

    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 12;
    Chart.defaults.plugins.legend.display = false;
    Chart.defaults.plugins.tooltip.backgroundColor = '#0a0a0a';
    Chart.defaults.plugins.tooltip.cornerRadius = 6;
    Chart.defaults.plugins.tooltip.padding = 10;
    Chart.defaults.plugins.tooltip.titleFont = { weight: '600' };
    Chart.defaults.scale.grid.color = 'rgba(0,0,0,0.05)';
    Chart.defaults.scale.ticks.color = '#737373';

    function sheetURL(gid) {
        return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&gid=' + gid;
    }
    function fetchSheet(gid) {
        return fetch(sheetURL(gid)).then(function(r) { return r.text(); }).then(function(text) {
            return JSON.parse(text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '')).table;
        });
    }
    function gv(row, col) { return (row && row.c && row.c[col]) ? row.c[col].v : null; }
    function gf(row, col) { return (row && row.c && row.c[col]) ? (row.c[col].f || String(row.c[col].v || '')) : ''; }
    function fmtMoney(n) {
        if (n == null || isNaN(n)) return '$0';
        if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
        if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
        return '$' + n.toLocaleString();
    }
    function fmtNum(n) { return (n == null || isNaN(n)) ? '0' : n.toLocaleString(undefined, { maximumFractionDigits: 2 }); }
    function pctChange(prev, curr, invert) {
        if (!prev) return { text: '\u2014', cls: '' };
        var pct = ((curr - prev) / Math.abs(prev)) * 100;
        var arrow = pct >= 0 ? '\u2191' : '\u2193';
        var cls = invert ? (pct >= 0 ? 'down' : 'up') : (pct >= 0 ? 'up' : 'down');
        return { text: arrow + ' ' + Math.abs(pct).toFixed(1) + '%', cls: cls };
    }
    function pctChangeFromPrev(prev, curr, prevLabel, invert) {
        var ch = pctChange(prev, curr, invert);
        if (ch.cls && prevLabel) ch.text += ' from ' + prevLabel;
        return ch;
    }
    function findRow(rows, label, col) {
        col = col || 0;
        for (var i = 0; i < rows.length; i++) {
            var c = gv(rows[i], col);
            if (c && c.toString().trim().toLowerCase() === label.trim().toLowerCase()) return rows[i];
        }
        return null;
    }
    function sectionRows(rows, start, ends, colA) {
        colA = colA || 0;
        var results = [], inSec = false;
        for (var i = 0; i < rows.length; i++) {
            var label = gv(rows[i], colA);
            if (label && label.toString().trim() === start.trim()) { inSec = true; continue; }
            if (inSec && label && ends.indexOf(label.toString().trim()) !== -1) break;
            if (inSec) results.push(rows[i]);
        }
        return results;
    }

    function statCard(title, value, changeObj, iconSvg, prevValue, ytdValue) {
        var prevHtml = prevValue ? '<div style="font-size:0.75rem;color:var(--muted-fg);margin-top:2px;">prev: ' + prevValue + '</div>' : '';
        var ytdHtml = ytdValue != null ? '<div style="font-size:0.75rem;color:var(--primary);margin-top:2px;font-weight:600;">YTD: ' + ytdValue + '</div>' : '';
        return '<div class="card"><div class="card-header"><div class="card-header-row"><span class="card-title">' + title + '</span><span class="card-icon">' + iconSvg + '</span></div></div><div class="card-content"><div class="stat-value">' + value + '</div>' + prevHtml + ytdHtml + '<div class="stat-change"><span class="' + changeObj.cls + '">' + changeObj.text + '</span></div></div></div>';
    }

    var ICONS = {
        dollar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
        users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
        target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
        clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        trending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>',
        bar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>',
        mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>',
        mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
        globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>',
        heart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',
        phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
        inbox: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>'
    };

    // ═══════════════════════════════════════════════
    //  SALES TAB
    // ═══════════════════════════════════════════════
    // Fetch the full sales sheet + a second range fetch for Pipeline (col B is number-typed
    // globally, so string values like "$145k / $1.74M" get dropped in the full fetch).
    function fetchPipelineRange() {
        var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&gid=0&range=A20:C40';
        return fetch(url).then(function(r) { return r.text(); }).then(function(text) {
            return JSON.parse(text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '')).table;
        });
    }
    Promise.all([fetchSheet('0'), fetchPipelineRange()]).then(function(results) {
        renderSales(results[0], results[1]);
    }).catch(function(err) {
        document.getElementById('tab-sales').innerHTML = '<div class="loading" style="color:var(--destructive)">Failed to load sales data: ' + err.message + '</div>';
    });

    function renderSales(table, pipelineTable) {
        var rows = table.rows;
        var el = document.getElementById('tab-sales');
        var html = '';

        // Extract month labels dynamically from column headers
        var monthCols = [];
        for (var ci = 1; ci < table.cols.length; ci++) {
            var lbl = (table.cols[ci].label || '').trim();
            if (lbl && lbl.length > 0 && (table.cols[ci].type === 'number' || table.cols[ci].type === 'string')) {
                // Check if it looks like a month name
                if (/^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i.test(lbl)) {
                    monthCols.push({ idx: ci, label: lbl.replace(/[\s-]+$/, '') });
                }
            }
        }
        if (monthCols.length === 0) {
            // Fallback: grab any non-empty labeled columns after col 0
            for (var ci2 = 1; ci2 < table.cols.length; ci2++) {
                var lbl2 = (table.cols[ci2].label || '').trim();
                if (lbl2) monthCols.push({ idx: ci2, label: lbl2 });
            }
        }
        var monthLabels = monthCols.map(function(m) { return m.label; });
        var lastCol = monthCols.length ? monthCols[monthCols.length - 1].idx : 1;
        var prevCol = monthCols.length > 1 ? monthCols[monthCols.length - 2].idx : null;
        var prevLabel = monthCols.length > 1 ? monthCols[monthCols.length - 2].label : '';

        // Update subtitle
        if (monthLabels.length > 0) {
            document.getElementById('dash-subtitle').textContent = monthLabels[0] + ' \u2013 ' + monthLabels[monthLabels.length - 1] + ' 2026 \u00B7 Rankings.io';
        }

        function lastVal(key) { var r = findRow(rows, key); return r ? (gv(r, lastCol) || 0) : 0; }
        function prevVal(key) { if (!prevCol) return 0; var r = findRow(rows, key); return r ? (gv(r, prevCol) || 0) : 0; }
        function ytdSum(key) {
            var r = findRow(rows, key);
            if (!r) return 0;
            var sum = 0;
            monthCols.forEach(function(m) { sum += (gv(r, m.idx) || 0); });
            return sum;
        }

        var arrLast = lastVal('Total ARR'), arrPrev = prevVal('Total ARR');
        var mrrLast = lastVal('Total MRR'), mrrPrev = prevVal('Total MRR');
        var dealsLast = lastVal('Deals Closed'), dealsPrev = prevVal('Deals Closed');
        var wrLast = lastVal('Win Rate (From Qualifed)'), wrPrev = prevVal('Win Rate (From Qualifed)');

        // Stat cards
        html += '<div class="stat-grid">';
        html += statCard('Total ARR', fmtMoney(arrLast), pctChangeFromPrev(arrPrev, arrLast, prevLabel), ICONS.dollar, fmtMoney(arrPrev), fmtMoney(ytdSum('Total ARR')));
        html += statCard('Total MRR', fmtMoney(mrrLast), pctChangeFromPrev(mrrPrev, mrrLast, prevLabel), ICONS.dollar, fmtMoney(mrrPrev), fmtMoney(ytdSum('Total MRR')));
        html += statCard('Deals Closed', fmtNum(dealsLast), pctChangeFromPrev(dealsPrev, dealsLast, prevLabel), ICONS.target, fmtNum(dealsPrev), fmtNum(ytdSum('Deals Closed')));
        html += statCard('Win Rate', typeof wrLast === 'number' && wrLast < 1 ? (wrLast * 100).toFixed(0) + '%' : fmtNum(wrLast) + '%',
            pctChangeFromPrev(wrPrev, wrLast, prevLabel), ICONS.trending,
            typeof wrPrev === 'number' && wrPrev < 1 ? (wrPrev * 100).toFixed(0) + '%' : fmtNum(wrPrev) + '%');
        html += '</div>';

        // Key Metrics Detail table
        html += '<div class="card chart-full"><div class="card-header"><div class="card-title">Key Metrics Detail</div></div><div class="card-content"><table class="dtable dtable-lg"><thead><tr><th>Metric</th>';
        monthLabels.forEach(function(m) { html += '<th>' + m + '</th>'; });
        html += '<th>Change</th></tr></thead><tbody>';
        var kpiRows = [
            ['Total ARR', 'money'], ['Total MRR', 'money'], ['Deals Closed', 'num'],
            ['Average MRR Per Deal', 'money'], ['Average ARR Per Deal', 'money'],
            ['Average Sales Cycle (Days)', 'days', true],
            ['Win Rate (From Qualifed)', 'pct']
        ];
        kpiRows.forEach(function(k) {
            var r = findRow(rows, k[0]);
            if (!r) return;
            var vals = monthCols.map(function(m) { return gv(r, m.idx) || 0; });
            var ch = vals.length > 1 ? pctChange(vals[vals.length - 2], vals[vals.length - 1], !!k[2]) : { text: '\u2014', cls: '' };
            html += '<tr><td>' + k[0] + '</td>';
            vals.forEach(function(v, vi) {
                var str;
                if (k[1] === 'money') str = fmtMoney(v);
                else if (k[1] === 'days') str = fmtNum(v) + 'd';
                else if (k[1] === 'pct') str = typeof v === 'number' && v < 1 ? (v * 100).toFixed(0) + '%' : fmtNum(v) + '%';
                else str = fmtNum(v);
                if (vi === vals.length - 1 && vals.length > 1) {
                    html += '<td class="mono ' + ch.cls + '">' + str + '</td>';
                } else {
                    html += '<td class="mono">' + str + '</td>';
                }
            });
            html += '<td><span class="' + ch.cls + '">' + ch.text + '</span></td></tr>';
        });
        html += '</tbody></table></div></div>';

        // Charts: Rep ARR + Outbound
        html += '<div class="chart-grid">';
        html += '<div class="card"><div class="card-header"><div class="card-title">Closed Won ARR by Rep</div><div class="card-desc">' + monthLabels.join(' vs ') + '</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-rep-arr"></canvas></div></div></div>';
        html += '<div class="card"><div class="card-header"><div class="card-title">Outbound Performance</div><div class="card-desc">Key outbound metrics</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-outbound"></canvas></div></div></div>';
        html += '</div>';

        // Outbound detail table
        var outRows = sectionRows(rows, 'Outbound', ['Feb Pipeline Carryover', 'Pipeline']);

                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false },
                        tooltip: { callbacks: { label: function(c) { return c.raw.toFixed(0) + '%'; } } }
                    },
                    scales: { y: { min: 0, max: 100, ticks: { callback: function(v) { return v + '%'; } } } }
                }
            });

            // Inbound vs MDR chart
            var inbMdrLabels = mktMonthLabels;
            var inbSetsVals = mktMonths.map(function(m) { return inbSetsRow ? (gv(inbSetsRow, m.idx) || 0) : 0; });
            var inbHoldsVals = mktMonths.map(function(m) { return inbHoldsRow ? (gv(inbHoldsRow, m.idx) || 0) : 0; });
            var mdrSetsVals = mktMonths.map(function(m) { return mdrSetsRow ? (gv(mdrSetsRow, m.idx) || 0) : 0; });
            var mdrHoldsVals = mktMonths.map(function(m) { return mdrHoldsRow ? (gv(mdrHoldsRow, m.idx) || 0) : 0; });
            new Chart(document.getElementById('chart-inbound-mdr'), {
                type: 'bar',
                data: {
                    labels: inbMdrLabels,
                    datasets: [
                        { label: 'Inbound Sets', data: inbSetsVals, backgroundColor: COLORS.primary, borderRadius: 4 },
                        { label: 'Inbound Holds', data: inbHoldsVals, backgroundColor: COLORS.blue, borderRadius: 4 },
                        { label: 'MDR Sets', data: mdrSetsVals, backgroundColor: '#eedc82', borderRadius: 4 },
                        { label: 'MDR Holds', data: mdrHoldsVals, backgroundColor: '#f97316', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // PIMCON chart
            var pimconMetrics = [
                { label: 'Projected Attendance', metric: 'Projected attendance cumulative' },
                { label: 'Registered', metric: 'Registered attendees cumulative' },
                { label: 'Sponsorship ($K)', metric: 'Total PIMCON sponsorship sold cumulative', divisor: 1000 }
            ];
            // Fallback metric names
            var pimconFallbacks = {
                'Projected attendance cumulative': ['Projected attendance'],
                'Registered attendees cumulative': ['Registered attendees'],
                'Total PIMCON sponsorship sold cumulative': ['Total sponnsorship sold', 'Total sponsorship sold', 'Total PIMCON sponsorship sold']
            };
            var pcDatasets = [];
            mktMonths.forEach(function(m, mi) {
                var data = pimconMetrics.map(function(pm) {
                    var r = mktRow(pm.metric);
                    if (!r && pimconFallbacks[pm.metric]) {
                        pimconFallbacks[pm.metric].some(function(fb) { r = mktRow(fb); return !!r; });
                    }
                    var val = r ? (gv(r, m.idx) || 0) : 0;
                    return pm.divisor ? val / pm.divisor : val;
                });
                pcDatasets.push({ label: m.label, data: data, backgroundColor: BAR_COLORS[mi], borderRadius: 4 });
            });
            new Chart(document.getElementById('chart-pimcon'), {
                type: 'bar',
                data: { labels: pimconMetrics.map(function(pm) { return pm.label; }), datasets: pcDatasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Newsletter chart
            var nlMetrics = ['Total Subscribers', 'New Subscribers', 'Total Views'];
            var nlDatasets = [];
            mktMonths.forEach(function(m, mi) {
                var data = nlMetrics.map(function(nm) {
                    var r = mktRow(nm);
                    return r ? (gv(r, m.idx) || 0) : 0;
                });
                nlDatasets.push({ label: m.label, data: data, backgroundColor: BAR_COLORS[mi], borderRadius: 4 });
            });
            new Chart(document.getElementById('chart-newsletter'), {
                type: 'bar',
                data: { labels: nlMetrics, datasets: nlDatasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // YouTube chart
            var ytMetrics = [
                { label: 'Subscribers', metric: 'YouTube Total Subscribers' },
                { label: 'Long Form Views', metric: 'YouTube Long Form Average Views' },
                { label: 'Shorts Views', metric: 'YouTube Shorts Average Views' }
            ];
            var ytDatasets = [];
            mktMonths.forEach(function(m, mi) {
                var data = ytMetrics.map(function(ym) {
                    var r = mktRow(ym.metric);
                    return r ? (gv(r, m.idx) || 0) : 0;
                });
                ytDatasets.push({ label: m.label, data: data, backgroundColor: BAR_COLORS[mi], borderRadius: 4 });
            });
            new Chart(document.getElementById('chart-youtube'), {
                type: 'bar',
                data: { labels: ytMetrics.map(function(ym) { return ym.label; }), datasets: ytDatasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }, 50);
    }

    // Get the top-level KPI rows (before the first section header in col A)
    function getKpiRows(rows) {
        var result = [];
        for (var i = 0; i < rows.length; i++) {
            var colA = gv(rows[i], 0);
            var colB = gv(rows[i], 1);
            // Stop when we hit a section header (text in column A)
            if (colA && colA.toString().trim() === 'SOCIAL MEDIA') break;
            if (colB && colB.toString().trim()) result.push(rows[i]);
        }
        return result;
    }

    function mktSectionRows(rows, startLabel, endLabels) {
        var results = [], inSection = false;
        for (var i = 0; i < rows.length; i++) {
            var labelA = gv(rows[i], 0);
            if (labelA && labelA.toString().trim() === startLabel.trim()) { inSection = true; continue; }
            if (inSection && labelA && endLabels.indexOf(labelA.toString().trim()) !== -1) break;
            if (inSection) results.push(rows[i]);
        }
        return results;
    }
})();
</script>

</body>
</html>
