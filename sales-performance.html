<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Dashboard — Revenue Kitchen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f4f0e6;
            --card: #ffffff;
            --card-border: #e5e5e5;
            --foreground: #0a0a0a;
            --muted: #f5f5f5;
            --muted-fg: #737373;
            --primary: #07374F;
            --primary-fg: #fafafa;
            --accent: #eaff6a;
            --accent-warm: #eedc82;
            --destructive: #c0392b;
            --success: #22c55e;
            --blue: #3c94d1;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--foreground); line-height: 1.5; }

        /* ── Top bar ── */
        .topbar {
            background: var(--primary);
            padding: 0.75rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar a {
            color: rgba(255,255,255,0.5); text-decoration: none;
            font-size: 0.8rem; font-weight: 500;
            display: inline-flex; align-items: center; gap: 6px;
            transition: color 0.2s;
        }
        .topbar a:hover { color: #fff; }
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.35);
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ── Dashboard container ── */
        .dash { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

        .dash-header { margin-bottom: 1.5rem; }
        .dash-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--foreground); }
        .dash-header p { font-size: 0.85rem; color: var(--muted-fg); margin-top: 2px; }

        /* ── Tabs ── */
        .tabs {
            display: inline-flex; border: 1px solid var(--card-border);
            border-radius: 8px; background: var(--muted); padding: 3px; margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.45rem 1rem; border: none; background: none;
            font-family: inherit; font-size: 0.8rem; font-weight: 500;
            color: var(--muted-fg); border-radius: 6px; cursor: pointer;
            transition: all 0.15s;
        }
        .tab-btn:hover { color: var(--foreground); }
        .tab-btn.active { background: var(--card); color: var(--foreground); box-shadow: var(--shadow); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Card ── */
        .card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: var(--radius); box-shadow: var(--shadow);
        }
        .card-header { padding: 1.25rem 1.5rem 0; }
        .card-header-row { display: flex; align-items: flex-start; justify-content: space-between; }
        .card-title { font-size: 0.85rem; font-weight: 600; color: var(--foreground); }
        .card-desc { font-size: 0.78rem; color: var(--muted-fg); margin-top: 2px; }
        .card-icon { color: var(--muted-fg); }
        .card-icon svg { width: 16px; height: 16px; }
        .card-content { padding: 1rem 1.5rem 1.5rem; }

        /* ── Stat cards ── */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--foreground); line-height: 1.2; margin-top: 0.25rem; }
        .stat-change { font-size: 0.75rem; color: var(--muted-fg); margin-top: 2px; }
        .stat-change .up { color: var(--success); font-weight: 600; }
        .stat-change .down { color: var(--destructive); font-weight: 600; }

        /* ── Chart grid ── */
        .chart-grid { display: grid; grid-template-columns: 4fr 3fr; gap: 1rem; margin-bottom: 1.5rem; }
        .chart-full { margin-bottom: 1.5rem; }
        .chart-wrap { position: relative; width: 100%; height: 300px; }
        .chart-wrap canvas { display: block; }

        /* ── Table inside card ── */
        .dtable { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .dtable thead th {
            text-align: left; font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--muted-fg); padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--card-border);
        }
        .dtable tbody td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f0f0f0; }
        .dtable tbody tr:last-child td { border-bottom: none; }
        .dtable .mono { font-variant-numeric: tabular-nums; font-weight: 600; }
        .dtable .muted { color: var(--muted-fg); }
        .dtable .total-row td { font-weight: 700; border-top: 2px solid var(--primary); background: rgba(234,255,106,0.08); }
        .dtable-lg { font-size: 0.95rem; }
        .dtable-lg thead th { font-size: 0.78rem; padding: 0.65rem 1rem; }
        .dtable-lg tbody td { padding: 0.75rem 1rem; }
        .dtable .up { color: var(--success); font-weight: 600; }
        .dtable .down { color: var(--destructive); font-weight: 600; }

        /* ── Loading ── */
        .loading { text-align: center; padding: 4rem; color: var(--muted-fg); font-size: 0.85rem; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .dash { padding: 1rem; }
            .stat-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
            .stat-value { font-size: 1.3rem; }
            .card-content { padding: 0.75rem 1rem 1rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="index.html">&larr; Revenue Kitchen</a>
    <span class="live-badge"><span class="live-dot"></span> Live from Google Sheets</span>
</div>

<div class="dash">
    <div class="dash-header">
        <h1>Performance Dashboard</h1>
        <p>January &ndash; February 2025 &nbsp;&middot;&nbsp; Rankings.io</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="sales">Sales</button>
        <button class="tab-btn" data-tab="marketing">Marketing</button>
    </div>

    <div class="tab-panel active" id="tab-sales">
        <div class="loading">Loading sales data&hellip;</div>
    </div>
    <div class="tab-panel" id="tab-marketing">
        <div class="loading">Loading marketing data&hellip;</div>
    </div>
</div>

<script>
(function() {
    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-panel').forEach(function(c) { c.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    var SHEET_ID = '18WMXkoKVY-JiWvPMt6e06fljsufO4YziLropqidkYek';
    var chartDefaults = {
        borderRadius: 4,
        barPercentage: 0.65,
        categoryPercentage: 0.8
    };
    var COLORS = {
        primary: '#07374F',
        primaryLight: 'rgba(7,55,79,0.7)',
        blue: '#3c94d1',
        blueLight: 'rgba(60,148,209,0.15)',
        accent: '#eaff6a',
        success: '#22c55e',
        destructive: '#c0392b',
        muted: '#e5e5e5',
        warmYellow: '#eedc82'
    };

    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 12;
    Chart.defaults.plugins.legend.display = false;
    Chart.defaults.plugins.tooltip.backgroundColor = '#0a0a0a';
    Chart.defaults.plugins.tooltip.cornerRadius = 6;
    Chart.defaults.plugins.tooltip.padding = 10;
    Chart.defaults.plugins.tooltip.titleFont = { weight: '600' };
    Chart.defaults.scale.grid.color = 'rgba(0,0,0,0.05)';
    Chart.defaults.scale.ticks.color = '#737373';

    function sheetURL(gid) {
        return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&gid=' + gid;
    }
    function fetchSheet(gid) {
        return fetch(sheetURL(gid)).then(function(r) { return r.text(); }).then(function(text) {
            return JSON.parse(text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '')).table;
        });
    }
    function gv(row, col) { return (row && row.c && row.c[col]) ? row.c[col].v : null; }
    function gf(row, col) { return (row && row.c && row.c[col]) ? (row.c[col].f || String(row.c[col].v || '')) : ''; }
    function fmtMoney(n) {
        if (n == null || isNaN(n)) return '$0';
        if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
        if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
        return '$' + n.toLocaleString();
    }
    function fmtNum(n) { return (n == null || isNaN(n)) ? '0' : n.toLocaleString(undefined, { maximumFractionDigits: 2 }); }
    function pctStr(jan, feb, invert) {
        if (!jan) return { text: '\u2014', cls: '' };
        var pct = ((feb - jan) / Math.abs(jan)) * 100;
        var arrow = pct >= 0 ? '\u2191' : '\u2193';
        var cls = invert ? (pct >= 0 ? 'down' : 'up') : (pct >= 0 ? 'up' : 'down');
        return { text: arrow + ' ' + Math.abs(pct).toFixed(1) + '% from Jan', cls: cls };
    }
    function findRow(rows, label, col) {
        col = col || 0;
        for (var i = 0; i < rows.length; i++) { var c = gv(rows[i], col); if (c && c.trim() === label.trim()) return rows[i]; }
        return null;
    }
    function sectionRows(rows, start, ends, colA) {
        colA = colA || 0;
        var results = [], inSec = false;
        for (var i = 0; i < rows.length; i++) {
            var label = gv(rows[i], colA);
            if (label && label.trim() === start.trim()) { inSec = true; continue; }
            if (inSec && label && ends.indexOf(label.trim()) !== -1) break;
            if (inSec) results.push(rows[i]);
        }
        return results;
    }

    function statCard(title, value, changeObj, iconSvg, prevValue) {
        var prevHtml = prevValue ? '<div style="font-size:0.75rem;color:var(--muted-fg);margin-top:2px;">prev: ' + prevValue + '</div>' : '';
        return '<div class="card"><div class="card-header"><div class="card-header-row"><span class="card-title">' + title + '</span><span class="card-icon">' + iconSvg + '</span></div></div><div class="card-content"><div class="stat-value">' + value + '</div>' + prevHtml + '<div class="stat-change"><span class="' + changeObj.cls + '">' + changeObj.text + '</span></div></div></div>';
    }

    var ICONS = {
        dollar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
        users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
        target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
        clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        trending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>',
        bar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>',
        mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>',
        mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
        globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>',
        heart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>'
    };

    // ═══════════════════════════════════════════════
    //  SALES TAB
    // ═══════════════════════════════════════════════
    fetchSheet('1217173270').then(renderSales).catch(function(err) {
        document.getElementById('tab-sales').innerHTML = '<div class="loading" style="color:var(--destructive)">Failed to load sales data: ' + err.message + '</div>';
    });

    function renderSales(table) {
        var rows = table.rows;
        var el = document.getElementById('tab-sales');
        var html = '';

        // Extract month labels dynamically from column headers (skip col 0 = labels)
        var monthCols = [];
        for (var ci = 1; ci < table.cols.length; ci++) {
            var lbl = (table.cols[ci].label || '').trim();
            if (lbl && table.cols[ci].type === 'number') {
                monthCols.push({ idx: ci, label: lbl.replace(/[\s-]+$/, '') });
            }
        }
        var monthLabels = monthCols.map(function(m) { return m.label; });
        var lastCol = monthCols.length ? monthCols[monthCols.length - 1].idx : 1;
        var prevCol = monthCols.length > 1 ? monthCols[monthCols.length - 2].idx : null;

        // Helper: get all month values for a metric
        function monthVals(key) {
            var r = findRow(rows, key);
            return monthCols.map(function(m) { return gv(r, m.idx) || 0; });
        }
        function lastVal(key) { var r = findRow(rows, key); return gv(r, lastCol) || 0; }
        function prevVal(key) { if (!prevCol) return 0; var r = findRow(rows, key); return gv(r, prevCol) || 0; }

        var arrLast = lastVal('Total ARR'), arrPrev = prevVal('Total ARR');
        var mrrLast = lastVal('Total MRR'), mrrPrev = prevVal('Total MRR');
        var dealsLast = lastVal('Deals Closed'), dealsPrev = prevVal('Deals Closed');
        var wrLast = lastVal('Win Rate (From Qualifed)'), wrPrev = prevVal('Win Rate (From Qualifed)');

        // Stat cards
        html += '<div class="stat-grid">';
        html += statCard('Total ARR', fmtMoney(arrLast), pctStr(arrPrev, arrLast), ICONS.dollar, fmtMoney(arrPrev));
        html += statCard('Total MRR', fmtMoney(mrrLast), pctStr(mrrPrev, mrrLast), ICONS.dollar, fmtMoney(mrrPrev));
        html += statCard('Deals Closed', fmtNum(dealsLast), pctStr(dealsPrev, dealsLast), ICONS.target, fmtNum(dealsPrev));
        html += statCard('Win Rate', (wrLast * 100).toFixed(0) + '%', pctStr(wrPrev, wrLast), ICONS.trending, (wrPrev * 100).toFixed(0) + '%');
        html += '</div>';

        // Key Metrics Detail — full width, right after stat cards
        html += '<div class="card chart-full"><div class="card-header"><div class="card-title">Key Metrics Detail</div></div><div class="card-content"><table class="dtable dtable-lg"><thead><tr><th>Metric</th>';
        monthLabels.forEach(function(m) { html += '<th>' + m + '</th>'; });
        html += '<th>Change</th></tr></thead><tbody>';
        var kpiRows = [
            ['Total ARR', 'money'], ['Total MRR', 'money'], ['Deals Closed', 'num'],
            ['Average MRR Per Deal', 'money'], ['Average ARR Per Deal', 'money'],
            ['Average Sales Cycle (Days)', 'days', true], ['Deals Lost to Price', 'num', true],
            ['Win Rate (From Qualifed)', 'pct']
        ];
        kpiRows.forEach(function(k) {
            var r = findRow(rows, k[0]);
            var vals = monthCols.map(function(m) { return gv(r, m.idx) || 0; });
            var ch = vals.length > 1 ? pctStr(vals[vals.length - 2], vals[vals.length - 1], !!k[2]) : { text: '\u2014', cls: '' };
            html += '<tr><td>' + k[0] + '</td>';
            vals.forEach(function(v, vi) {
                var str;
                if (k[1] === 'money') str = fmtMoney(v);
                else if (k[1] === 'days') str = fmtNum(v) + 'd';
                else if (k[1] === 'pct') str = (v * 100).toFixed(0) + '%';
                else str = fmtNum(v);
                // Color the latest month value red/green based on direction
                if (vi === vals.length - 1 && vals.length > 1) {
                    html += '<td class="mono ' + ch.cls + '">' + str + '</td>';
                } else {
                    html += '<td class="mono">' + str + '</td>';
                }
            });
            html += '<td><span class="' + ch.cls + '">' + ch.text.split(' from')[0] + '</span></td></tr>';
        });
        html += '</tbody></table></div></div>';

        // Chart row: Rep performance bar chart + Outbound bar chart
        html += '<div class="chart-grid">';
        html += '<div class="card"><div class="card-header"><div class="card-title">Closed Won ARR by Rep</div><div class="card-desc">' + monthLabels.join(' vs ') + ' comparison</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-rep-arr"></canvas></div></div></div>';
        html += '<div class="card"><div class="card-header"><div class="card-title">Outbound Performance</div><div class="card-desc">Key outbound metrics</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-outbound"></canvas></div></div></div>';
        html += '</div>';

        // Pipeline
        var pipeRows = sectionRows(rows, 'Pipeline', ['Total Pipeline']);
        html += '<div class="card chart-full"><div class="card-header"><div class="card-title">Pipeline by Rep</div><div class="card-desc">Current deal count</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-pipeline"></canvas></div></div></div>';

        el.innerHTML = html;

        // ── Build charts ──
        setTimeout(function() {
            // ── Rep ARR bar chart ──
            var repRows = sectionRows(rows, 'Sales Rep', ['Outbound']);
            var repNames = [];
            var repDatasets = [];
            var repBarColors = [COLORS.primary, COLORS.blue, '#22c55e', '#f97316', '#8b5cf6', '#ec4899'];
            monthCols.forEach(function(m, mi) {
                var data = [];
                repRows.forEach(function(r, ri) {
                    if (mi === 0) repNames.push(gv(r, 0));
                    data.push(gv(r, m.idx) || 0);
                });
                repDatasets.push({ label: m.label, data: data, backgroundColor: repBarColors[mi % repBarColors.length], borderRadius: 4 });
            });
            new Chart(document.getElementById('chart-rep-arr'), {
                type: 'bar',
                data: { labels: repNames, datasets: repDatasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } },
                        tooltip: { callbacks: { label: function(c) { return c.dataset.label + ': $' + c.raw.toLocaleString(); } } }
                    },
                    scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return '$' + (v/1000) + 'K'; } } } }
                }
            });

            // ── Outbound bar chart ──
            var outRows = sectionRows(rows, 'Outbound', ['Feb Pipeline Carryover', 'Pipeline']);
            var outLabels = [];
            var outDatasets = [];
            monthCols.forEach(function(m, mi) {
                var data = [];
                outRows.forEach(function(r, ri) {
                    var name = gv(r, 0);
                    if (name.trim() === 'Closed Won ARR') return;
                    if (mi === 0) outLabels.push(name);
                    data.push(gv(r, m.idx) || 0);
                });
                outDatasets.push({ label: m.label, data: data, backgroundColor: repBarColors[mi % repBarColors.length], borderRadius: 4 });
            });
            new Chart(document.getElementById('chart-outbound'), {
                type: 'bar',
                data: { labels: outLabels, datasets: outDatasets },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                    scales: { x: { beginAtZero: true } }
                }
            });

            // ── Pipeline doughnut ──
            var pipeNames = [], pipeDeals = [];
            pipeRows.forEach(function(r) {
                var d = gv(r, lastCol) || 0;
                if (d > 0) { pipeNames.push(gv(r, 0).trim()); pipeDeals.push(d); }
            });
            new Chart(document.getElementById('chart-pipeline'), {
                type: 'doughnut',
                data: {
                    labels: pipeNames,
                    datasets: [{ data: pipeDeals, backgroundColor: [COLORS.primary, COLORS.blue, '#eedc82', '#22c55e', '#f97316', '#8b5cf6', '#ec4899'], borderWidth: 0, spacing: 2 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '60%',
                    plugins: { legend: { display: true, position: 'bottom', labels: { padding: 12, font: { size: 11 } } } }
                }
            });
        }, 50);
    }

    // ═══════════════════════════════════════════════
    //  MARKETING TAB
    // ═══════════════════════════════════════════════
    fetchSheet('2097807044').then(renderMarketing).catch(function(err) {
        document.getElementById('tab-marketing').innerHTML = '<div class="loading" style="color:var(--destructive)">Failed to load marketing data: ' + err.message + '</div>';
    });

    function renderMarketing(table) {
        var rows = table.rows;
        var el = document.getElementById('tab-marketing');
        var html = '';

        function mktRow(label) { return findRow(rows, label, 1); }
        function mktVal(label) { var r = mktRow(label); return { jan: gv(r, 2), feb: gv(r, 3) }; }

        var followers = mktVal('Chris Personal Followers (All Platforms)');
        var newsletter = mktVal('Total Newsletter Subscribers');
        var podcast = mktVal('Podcast Downlads + Streams');
        var sponsorship = mktVal('Total sponnsorship sold');

        // Stat cards
        html += '<div class="stat-grid">';
        html += statCard('Chris Followers', followers.feb != null ? fmtNum(followers.feb) : '\u2014', followers.jan ? pctStr(followers.jan, followers.feb) : { text: '\u2014', cls: '' }, ICONS.heart, followers.jan ? fmtNum(followers.jan) : null);
        html += statCard('Newsletter Subs', fmtNum(newsletter.feb), pctStr(newsletter.jan, newsletter.feb), ICONS.mail, fmtNum(newsletter.jan));
        html += statCard('Podcast Downloads', fmtNum(podcast.feb), pctStr(podcast.jan, podcast.feb), ICONS.mic, fmtNum(podcast.jan));
        html += statCard('Sponsorship Sold', fmtMoney(sponsorship.feb), pctStr(sponsorship.jan, sponsorship.feb), ICONS.dollar, fmtMoney(sponsorship.jan));
        html += '</div>';

        // Charts row: Social followers bar + Podcast metrics
        html += '<div class="chart-grid">';
        html += '<div class="card"><div class="card-header"><div class="card-title">Social Media Followers</div><div class="card-desc">Rankings.io platform breakdown (Feb)</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-social"></canvas></div></div></div>';
        html += '<div class="card"><div class="card-header"><div class="card-title">Podcast Performance</div><div class="card-desc">January vs February</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-podcast"></canvas></div></div></div>';
        html += '</div>';

        // Second row: Newsletter + YouTube + Website
        html += '<div class="chart-grid">';
        html += '<div class="card"><div class="card-header"><div class="card-title">Newsletter & YouTube</div><div class="card-desc">Audience growth metrics</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-newsletter"></canvas></div></div></div>';
        html += '<div class="card"><div class="card-header"><div class="card-title">PIMCON</div><div class="card-desc">Event metrics</div></div><div class="card-content"><div class="chart-wrap"><canvas id="chart-pimcon"></canvas></div></div></div>';
        html += '</div>';

        // Full-width detail tables
        var sections = [
            { title: 'Social Media', start: 'SOCIAL MEDIA', end: ['PERSONAL SOCIAL (CHRIS)'] },
            { title: 'Personal Social (Chris)', start: 'PERSONAL SOCIAL (CHRIS)', end: ['PODCAST'] },
            { title: 'Podcast', start: 'PODCAST', end: ['NEWSLETTER'] },
            { title: 'Newsletter', start: 'NEWSLETTER', end: ['YouTube'] },
            { title: 'YouTube', start: 'YouTube', end: ['WEBSITE & SEO'] },
            { title: 'Website & SEO', start: 'WEBSITE & SEO', end: ['PIMCON'] },
            { title: 'PIMCON', start: 'PIMCON', end: ['__END__'] }
        ];

        sections.forEach(function(sec) {
            var secRows = mktSectionRows(rows, sec.start, sec.end);
            if (secRows.length === 0) return;
            html += '<div class="card chart-full"><div class="card-header"><div class="card-title">' + sec.title + '</div></div><div class="card-content"><table class="dtable"><thead><tr><th>Metric</th><th>Jan</th><th>Feb</th><th>Change</th><th>Notes</th></tr></thead><tbody>';
            secRows.forEach(function(r) {
                var metric = gv(r, 1); if (!metric || !metric.trim()) return;
                var jan = gv(r, 2), feb = gv(r, 3), note = gv(r, 5) || '';
                var isPct = (metric.toLowerCase().indexOf('rate') !== -1 || metric.toLowerCase().indexOf('consumption') !== -1);
                var isMoney = (metric.toLowerCase().indexOf('sold') !== -1 || metric.toLowerCase().indexOf('sponsorship') !== -1);
                var jStr, fStr;
                if (isPct) { jStr = jan != null ? gf(r, 2) : '\u2014'; fStr = feb != null ? gf(r, 3) : '\u2014'; }
                else if (isMoney) { jStr = jan != null ? fmtMoney(jan) : '\u2014'; fStr = feb != null ? fmtMoney(feb) : '\u2014'; }
                else { jStr = jan != null ? fmtNum(jan) : '\u2014'; fStr = feb != null ? fmtNum(feb) : '\u2014'; }
                var ch = (jan != null && feb != null) ? pctStr(jan, feb) : { text: '\u2014', cls: '' };
                html += '<tr><td>' + metric.trim() + '</td><td class="mono">' + jStr + '</td><td class="mono">' + fStr + '</td><td><span class="' + ch.cls + '">' + ch.text.split(' from')[0] + '</span></td><td class="muted" style="font-size:0.78rem;font-style:italic">' + note + '</td></tr>';
            });
            html += '</tbody></table></div></div>';
        });

        el.innerHTML = html;

        // ── Build marketing charts ──

        // Social followers horizontal bar
        var socialData = [
            { label: 'LinkedIn', val: gv(mktRow('Rankings LinkedIn New Followers'), 6) || gv(findRow(rows, 'Rankings LinkedIn New Followers', 1), 6) || 18962 },
            { label: 'X / Twitter', val: gv(mktRow('Rankings X Followers'), 3) || 78786 },
            { label: 'Instagram', val: 17177 },
            { label: 'Facebook', val: gv(mktRow('Rankings Facebook New Followers'), 6) || 4000 },
            { label: 'YouTube', val: gv(mktRow('YouTube Total Subscribers'), 3) || 775 },
            { label: 'TikTok', val: gv(mktRow('Rankings TikTok Followers'), 3) || 514 }
        ];
        socialData.sort(function(a, b) { return b.val - a.val; });
        new Chart(document.getElementById('chart-social'), {
            type: 'bar',
            data: {
                labels: socialData.map(function(d) { return d.label; }),
                datasets: [{ data: socialData.map(function(d) { return d.val; }), backgroundColor: [COLORS.primary, COLORS.blue, '#e4405f', '#1877f2', '#ff0000', '#000000'], borderRadius: 4, borderWidth: 0 }]
            },
            options: {
                indexAxis: 'y', responsive: true,
                scales: { x: { beginAtZero: true, ticks: { callback: function(v) { return v >= 1000 ? (v/1000) + 'K' : v; } } } }
            }
        });

        // Podcast grouped bar
        var podMetrics = ['Episodes Released', 'Guests Booked', 'Guests Interviewed'];
        var podJan = [], podFeb = [];
        podMetrics.forEach(function(m) { var d = mktVal(m); podJan.push(d.jan || 0); podFeb.push(d.feb || 0); });
        new Chart(document.getElementById('chart-podcast'), {
            type: 'bar',
            data: {
                labels: podMetrics,
                datasets: [
                    { label: 'January', data: podJan, backgroundColor: COLORS.primary, borderRadius: 4 },
                    { label: 'February', data: podFeb, backgroundColor: COLORS.blue, borderRadius: 4 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // Newsletter + YouTube grouped bar
        var nlMetrics = ['Total Subscribers', 'New Subscribers', 'Total Views', 'Newsletter Issues Published'];
        var ytMetrics = ['YouTube New Subscribers', 'YouTube Total Subscribers', 'YouTube Long Form Published', 'YouTube Shorts Published'];
        var allMetrics = nlMetrics.concat(ytMetrics);
        var nlLabels = ['NL Subs', 'New NL Subs', 'NL Views', 'NL Issues', 'YT New Subs', 'YT Total Subs', 'YT Long Form', 'YT Shorts'];
        var nlJan = [], nlFeb = [];
        allMetrics.forEach(function(m) { var d = mktVal(m); nlJan.push(d.jan || 0); nlFeb.push(d.feb || 0); });
        new Chart(document.getElementById('chart-newsletter'), {
            type: 'bar',
            data: {
                labels: nlLabels,
                datasets: [
                    { label: 'January', data: nlJan, backgroundColor: COLORS.primary, borderRadius: 4 },
                    { label: 'February', data: nlFeb, backgroundColor: COLORS.blue, borderRadius: 4 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 10 } } } }
            }
        });

        // PIMCON metrics
        var pimconMetrics = ['Projected attendance', 'Registered attendees'];
        var pcJan = [], pcFeb = [];
        pimconMetrics.forEach(function(m) { var d = mktVal(m); pcJan.push(d.jan || 0); pcFeb.push(d.feb || 0); });
        var pcSponsor = mktVal('Total sponnsorship sold');
        new Chart(document.getElementById('chart-pimcon'), {
            type: 'bar',
            data: {
                labels: ['Projected Attendance', 'Registered', 'Sponsorship ($K)'],
                datasets: [
                    { label: 'January', data: [pcJan[0], pcJan[1], (pcSponsor.jan || 0) / 1000], backgroundColor: COLORS.primary, borderRadius: 4 },
                    { label: 'February', data: [pcFeb[0], pcFeb[1], (pcSponsor.feb || 0) / 1000], backgroundColor: COLORS.blue, borderRadius: 4 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    function mktSectionRows(rows, startLabel, endLabels) {
        var results = [], inSection = false;
        for (var i = 0; i < rows.length; i++) {
            var labelA = gv(rows[i], 0);
            if (labelA && labelA.trim() === startLabel.trim()) { inSection = true; continue; }
            if (inSection && labelA && endLabels.indexOf(labelA.trim()) !== -1) break;
            if (inSection) results.push(rows[i]);
        }
        return results;
    }
})();
</script>

</body>
</html>
