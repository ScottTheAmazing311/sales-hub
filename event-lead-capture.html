<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Event Lead Capture — Rankings.io</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    :root {
      --navy: #07374F;
      --navy-light: #0e5f87;
      --yellow: #eaff6a;
      --yellow-warm: #eedc82;
      --cream: #fefaed;
      --bg: #f4f0e6;
      --sky: #3c94d1;
      --text: #2c2c2c;
      --text-muted: #6b6b6b;
      --line: rgba(7,55,79,0.16);
      --radius: 10px;
      color-scheme: light;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    input, select, textarea { font-size: 16px; font-family: inherit; } /* no iOS zoom */

    /* ── Brand chrome ── */
    .stripe { height: 5px; background: var(--yellow-warm); }
    .rk-header {
      background: var(--navy); color: #fff;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .rk-mark {
      width: 38px; height: 38px; background: var(--yellow); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .rk-mark svg { width: 22px; height: 22px; }
    .rk-kicker {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--yellow-warm);
    }
    .rk-word {
      font-family: 'IBM Plex Mono', monospace; font-size: 1.12rem; font-weight: 600;
      color: #fff; letter-spacing: -0.3px;
    }

    .wrap { max-width: 460px; margin: 0 auto; padding: 22px 16px 48px; }

    h1 { font-family: 'IBM Plex Mono', monospace; font-size: 21px; font-weight: 600; color: var(--navy); letter-spacing: -0.3px; }
    .muted { color: var(--text-muted); font-size: 14px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .stack > * + * { margin-top: 16px; }
    .center { text-align: center; }
    .small { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); word-break: break-all; }
    .hidden { display: none !important; }

    /* ── Tiles ── */
    .tile, .pickbtn {
      display: flex; align-items: center; gap: 14px; width: 100%;
      background: var(--cream); border: 1px solid var(--line); border-top: 3px solid var(--navy);
      border-radius: var(--radius); padding: 16px 18px; text-align: left; text-decoration: none;
      color: inherit; cursor: pointer; font: inherit;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .tile:hover, .pickbtn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(7,55,79,0.12); }
    .tile:active, .pickbtn:active, .btn:active { transform: scale(.99); }
    .chip {
      width: 44px; height: 44px; flex-shrink: 0; border-radius: 10px; background: var(--navy);
      display: flex; align-items: center; justify-content: center;
    }
    .chip svg { width: 22px; height: 22px; fill: var(--yellow); }
    .tile b { display: block; font-size: 16px; font-weight: 600; color: var(--navy); }
    .tile span.sub { display: block; color: var(--text-muted); font-size: 13px; }
    .pickbtn { font-weight: 600; font-size: 16px; color: var(--navy); border-top-width: 1px; }
    .pickbtn::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--yellow);
      box-shadow: 0 0 0 3px rgba(234,255,106,0.25); flex-shrink: 0;
    }

    /* ── Forms ── */
    label.field { display: block; }
    label.field > span {
      display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; color: var(--navy); margin-bottom: 6px;
    }
    .ctrl {
      width: 100%; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 12px 14px; background: #fff; outline: none; color: var(--text);
    }
    .ctrl:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(7,55,79,0.12); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      width: 100%; border: 0; border-radius: var(--radius); padding: 15px;
      font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; cursor: pointer;
      letter-spacing: 0.3px;
    }
    .btn.primary { background: var(--navy); color: #fff; }
    .btn.primary:disabled { opacity: .5; }
    .btn.ghost { background: var(--cream); color: var(--navy); border: 1px solid var(--line); }
    a.btn { display: block; text-align: center; text-decoration: none; }

    .link {
      background: none; border: 0; font: inherit; cursor: pointer; padding: 0;
      font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--sky);
    }
    .link:hover { color: var(--navy); }

    .note { border-radius: var(--radius); padding: 12px 14px; font-size: 14px; font-weight: 500; }
    .note.ok { background: rgba(58,148,209,0.12); color: var(--navy); border: 1px solid rgba(58,148,209,0.3); }
    .note.err { background: #fdeceb; color: #a82318; border: 1px solid #f3c6c2; }
    .note.warn { background: var(--cream); color: var(--navy); border: 1px solid var(--yellow-warm); }

    /* ── QR ── */
    .qrcard { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
    .qrbox { background: #fff; border: 1px solid var(--line); border-top: 3px solid var(--navy); border-radius: 16px; padding: 22px; }
    .qrbox canvas, .qrbox img { display: block; }

    .spinner { width: 30px; height: 30px; border: 3px solid var(--line); border-top-color: var(--navy); border-radius: 50%; animation: spin .8s linear infinite; margin: 56px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { margin-top: 28px; text-align: center; }
    .footer .small { color: var(--text-muted); opacity: .8; }
  </style>
</head>
<body>
  <div class="stripe"></div>
  <header class="rk-header">
    <div class="rk-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#07374F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3h18v18H3z" /><path d="M8 12h8M12 8v8" />
      </svg>
    </div>
    <div>
      <div class="rk-kicker">Rankings.io — Event Capture</div>
      <div class="rk-word">Lead Capture</div>
    </div>
  </header>

  <main class="wrap">
    <div id="app"><div class="spinner"></div></div>
  </main>

  <script>
  // ---- Config -------------------------------------------------------------
  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHNIQ_wa-lShX9dPHmNnTGRG947V4lUf6II7buL-TSTyv4qSGq85btK2fZWzcCcjOykA/exec";
  var APP_URL = location.origin + location.pathname;
  var STORAGE_KEY = "rk.elc.activeRepId";

  // ---- Helpers ------------------------------------------------------------
  var app = document.getElementById("app");
  function h(html) { app.innerHTML = html; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }
  function qs(name) { return new URLSearchParams(location.search).get(name); }
  function configured() { return APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf("PASTE_YOUR") === -1; }

  var ICONS = {
    qr: '<path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zm4 6h-2v-2h-2v2h-2v2h2v2h2v-2h2v2h2v-4h-2v-2zm-6 0h2v2h-2v-2zm0 4h2v2h-2v-2z"/>',
    camera: '<path d="M9 2 7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>',
    keyboard: '<path d="M20 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zM8 9h2v2H8V9zm0 3h2v2H8v-2zM5 9h2v2H5V9zm0 3h2v2H5v-2zm11 6H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V9h2v2zm3 3h-2v-2h2v2zm0-3h-2V9h2v2z"/>',
    calendar: '<path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>',
  };
  function icon(name) { return '<svg viewBox="0 0 24 24">' + (ICONS[name] || "") + "</svg>"; }

  var reps = [];
  function repById(id) { for (var i = 0; i < reps.length; i++) if (reps[i].rep_id === id) return reps[i]; return null; }

  // ---- API ----------------------------------------------------------------
  function loadReps() {
    return fetch(APPS_SCRIPT_URL + "?action=reps")
      .then(function (r) { return r.json(); })
      .then(function (d) { reps = (d && d.reps) || []; return reps; });
  }
  function postAction(payload) {
    return fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    }).then(function (r) { return r.json(); });
  }

  // ---- Image downscale for OCR -------------------------------------------
  function fileToJpeg(file, maxEdge) {
    maxEdge = maxEdge || 1400;
    return createImageBitmap(file).then(function (bm) {
      var scale = Math.min(1, maxEdge / Math.max(bm.width, bm.height));
      var w = Math.round(bm.width * scale), hh = Math.round(bm.height * scale);
      var c = document.createElement("canvas"); c.width = w; c.height = hh;
      c.getContext("2d").drawImage(bm, 0, 0, w, hh);
      return c.toDataURL("image/jpeg", 0.85);
    });
  }

  // ---- vCard --------------------------------------------------------------
  function downloadVCard(rep) {
    function e(v) { return String(v || "").replace(/\\/g, "\\\\").replace(/\n/g, "\\n").replace(/,/g, "\\,").replace(/;/g, "\\;"); }
    var parts = rep.name.trim().split(/\s+/);
    var first = parts[0] || "", last = parts.slice(1).join(" ");
    var lines = ["BEGIN:VCARD", "VERSION:3.0", "N:" + e(last) + ";" + e(first) + ";;;", "FN:" + e(rep.name)];
    if (rep.company) lines.push("ORG:" + e(rep.company));
    if (rep.title) lines.push("TITLE:" + e(rep.title));
    if (rep.email) lines.push("EMAIL;TYPE=WORK:" + e(rep.email));
    if (rep.phone) lines.push("TEL;TYPE=WORK,VOICE:" + e(rep.phone));
    lines.push("END:VCARD");
    var blob = new Blob([lines.join("\r\n")], { type: "text/vcard" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = (rep.rep_id || "contact") + ".vcf";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  // ---- Lead form ----------------------------------------------------------
  function leadFormHTML(opts) {
    var extras = opts.extras
      ? '<label class="field"><span>Contact type</span>' +
          '<select class="ctrl" id="f_type">' +
          ["Lead", "Vendor", "Partner", "Client", "Other"].map(function (t) {
            return '<option value="' + t + '">' + t + "</option>"; }).join("") +
          "</select></label>" +
        '<label class="field"><span>Notes</span><textarea class="ctrl" id="f_notes" rows="3"></textarea></label>'
      : "";
    var vcard = opts.vcard
      ? '<button class="btn ghost" id="f_vcard" type="button">' + esc(opts.vcardLabel || "Save rep's contact") + "</button>"
      : "";
    return (
      '<form id="leadform" class="stack">' +
        '<div class="grid2">' +
          '<label class="field"><span>First name</span><input class="ctrl" id="f_first" autocomplete="given-name" /></label>' +
          '<label class="field"><span>Last name</span><input class="ctrl" id="f_last" autocomplete="family-name" /></label>' +
        "</div>" +
        '<label class="field"><span>Firm name</span><input class="ctrl" id="f_firm" autocomplete="organization" /></label>' +
        '<label class="field"><span>Email</span><input class="ctrl" id="f_email" type="email" inputmode="email" autocomplete="email" /></label>' +
        extras +
        '<button class="btn primary" id="f_submit" type="submit">' + esc(opts.submitLabel || "Save lead") + "</button>" +
        '<div id="f_msg"></div>' +
        vcard +
      "</form>"
    );
  }

  function wireLeadForm(opts) {
    var form = document.getElementById("leadform");
    var msg = document.getElementById("f_msg");
    var vc = document.getElementById("f_vcard");
    if (vc && opts.rep) vc.addEventListener("click", function () { downloadVCard(opts.rep); });

    form.addEventListener("submit", function (ev) {
      ev.preventDefault();
      var btn = document.getElementById("f_submit");
      btn.disabled = true; btn.textContent = "Saving…"; msg.innerHTML = "";

      var payload = {
        action: "lead", rep_id: opts.repId, source: opts.source,
        first_name: val("f_first"), last_name: val("f_last"),
        firm: val("f_firm"), email: val("f_email"),
        contact_type: opts.extras ? val("f_type") : "Lead",
        notes: opts.extras ? val("f_notes") : "",
      };

      postAction(payload).then(function (res) {
        btn.disabled = false; btn.textContent = opts.submitLabel || "Save lead";
        if (res && res.ok) {
          msg.innerHTML = '<div class="note ok">' + esc(opts.successLabel || "Lead saved ✓") + "</div>";
          form.reset();
          if (opts.onSaved) opts.onSaved();
        } else {
          msg.innerHTML = '<div class="note err">' + esc((res && res.error) || "Could not save") + "</div>";
        }
      }).catch(function () {
        btn.disabled = false; btn.textContent = opts.submitLabel || "Save lead";
        msg.innerHTML = '<div class="note err">Network error — try again.</div>';
      });
    });
  }
  function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ""; }
  function setVal(id, v) { var el = document.getElementById(id); if (el) el.value = v || ""; }

  // ---- Views --------------------------------------------------------------
  function viewPicker() {
    h(
      "<h1>Who are you?</h1>" +
      '<p class="muted">Pick your name once — we\'ll remember it on this device.</p>' +
      '<div class="stack" style="margin-top:20px">' +
        reps.map(function (r) {
          return '<button class="pickbtn" data-id="' + esc(r.rep_id) + '">' + esc(r.name) + "</button>";
        }).join("") +
      "</div>"
    );
    Array.prototype.forEach.call(document.querySelectorAll(".pickbtn"), function (b) {
      b.addEventListener("click", function () {
        localStorage.setItem(STORAGE_KEY, b.getAttribute("data-id")); viewHome();
      });
    });
  }

  function viewHome() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewPicker();
    h(
      '<div class="row">' +
        "<div><p class=\"muted\" style=\"margin:0\">Capturing as</p><h1>" + esc(rep.name) + "</h1></div>" +
        '<button class="link" id="switch">Switch</button>' +
      "</div>" +
      '<div class="stack" style="margin-top:24px">' +
        tile("qr", "qr", "My QR code", "Let a lead scan to fill the form") +
        tile("scan", "camera", "Scan a card", "Photo → auto-fill → save") +
        tile("manual", "keyboard", "Manual entry", "Type it in or hand over the phone") +
        '<a class="tile" href="' + esc(rep.scheduling_url) + '" target="_blank" rel="noopener">' +
          '<span class="chip">' + icon("calendar") + '</span><span><b>Schedule appointment</b><span class="sub">Open your booking link</span></span></a>' +
      "</div>"
    );
    document.getElementById("switch").addEventListener("click", function () {
      localStorage.removeItem(STORAGE_KEY); viewPicker();
    });
    bindNav();
  }
  function tile(route, ic, title, sub) {
    return '<button class="tile" data-route="' + route + '"><span class="chip">' + icon(ic) +
      '</span><span><b>' + esc(title) + '</b><span class="sub">' + esc(sub) + "</span></span></button>";
  }
  function bindNav() {
    Array.prototype.forEach.call(document.querySelectorAll(".tile[data-route]"), function (t) {
      t.addEventListener("click", function () {
        var r = t.getAttribute("data-route");
        if (r === "qr") viewQR(); else if (r === "scan") viewScan(); else if (r === "manual") viewManual();
      });
    });
  }

  function backBar(rep) {
    return '<div class="row"><button class="link" id="back">← Back</button><span class="muted">' + esc(rep.name) + "</span></div>";
  }
  function bindBack() { var b = document.getElementById("back"); if (b) b.addEventListener("click", viewHome); }

  function viewManual() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewHome();
    h(backBar(rep) + '<h1 style="margin-top:14px">Manual entry</h1>' +
      '<div style="margin-top:16px">' + leadFormHTML({ extras: true, submitLabel: "Save lead" }) + "</div>");
    bindBack();
    wireLeadForm({ repId: rep.rep_id, source: "manual", extras: true });
  }

  function viewQR() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewHome();
    var url = APP_URL + "?capture=" + encodeURIComponent(rep.rep_id);
    h(backBar(rep) + '<h1 style="margin-top:14px">My QR code</h1>' +
      '<div class="qrcard" style="margin-top:20px">' +
        '<p class="muted">Have the lead point their camera here. It opens your capture form.</p>' +
        '<div class="qrbox" id="qrbox"></div>' +
        "<p style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:17px;margin:0;color:var(--navy)\">" + esc(rep.name) + "</p>" +
        '<p class="small">' + esc(url) + "</p>" +
      "</div>");
    bindBack();
    renderQR(document.getElementById("qrbox"), url, 256);
  }

  // Primary: qrious (canvas). Fallback: image service if the library didn't load.
  function renderQR(box, url, size) {
    box.innerHTML = "";
    try {
      if (typeof QRious === "function") {
        var canvas = document.createElement("canvas");
        box.appendChild(canvas);
        new QRious({ element: canvas, value: url, size: size, level: "M", padding: 8, foreground: "#07374F" });
        return;
      }
    } catch (e) { /* fall through */ }
    var img = document.createElement("img");
    img.width = size; img.height = size; img.alt = "QR code";
    img.src = "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size +
      "&margin=8&color=07374F&data=" + encodeURIComponent(url);
    box.appendChild(img);
  }

  function viewScan() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewHome();
    h(backBar(rep) + '<h1 style="margin-top:14px">Scan a card</h1>' +
      '<div id="scanbody" style="margin-top:16px"></div>' +
      '<input id="file" type="file" accept="image/*" capture="environment" class="hidden" />');
    bindBack();

    var fileEl = document.getElementById("file");
    var bodyEl = document.getElementById("scanbody");

    function showStart(reading) {
      bodyEl.innerHTML =
        '<p class="muted">Take a photo of the card or badge. We\'ll auto-fill what we can read — you confirm before saving.</p>' +
        '<button class="btn primary" id="shoot" ' + (reading ? "disabled" : "") + ' style="margin-top:14px">' +
        (reading ? "Reading…" : "Take / choose photo") + "</button>";
      var s = document.getElementById("shoot");
      if (s && !reading) s.addEventListener("click", function () { fileEl.click(); });
    }
    function showConfirm(fields, warn) {
      bodyEl.innerHTML =
        (warn ? '<div class="note warn">' + esc(warn) + "</div>" : "") +
        '<p class="muted" style="margin-top:8px">Check the fields, fix any misreads, then save.</p>' +
        '<div style="margin-top:12px">' + leadFormHTML({ extras: true, submitLabel: "Save lead" }) + "</div>" +
        '<button class="btn ghost" id="again" style="margin-top:12px">Scan another card</button>';
      setVal("f_first", fields.firstName); setVal("f_last", fields.lastName);
      setVal("f_firm", fields.firm); setVal("f_email", fields.email);
      wireLeadForm({ repId: rep.rep_id, source: "card", extras: true });
      document.getElementById("again").addEventListener("click", function () { showStart(false); fileEl.click(); });
    }

    fileEl.addEventListener("change", function (ev) {
      var file = ev.target.files && ev.target.files[0];
      ev.target.value = "";
      if (!file) return;
      showStart(true);
      fileToJpeg(file).then(function (dataUrl) {
        return postAction({ action: "ocr", image: dataUrl, mediaType: "image/jpeg" });
      }).then(function (fields) {
        showConfirm(fields || { firstName: "", lastName: "", firm: "", email: "" });
      }).catch(function () {
        showConfirm({ firstName: "", lastName: "", firm: "", email: "" }, "Couldn't read the card — fill it in by hand.");
      });
    });

    showStart(false);
  }

  function viewCapture(repId) {
    var rep = repById(repId);
    if (!rep) {
      h('<div class="center" style="margin-top:48px"><h1>Link not found</h1>' +
        '<p class="muted">This QR code isn\'t recognized. Please ask the rep to try again.</p></div>');
      return;
    }
    var firstName = rep.name.split(/\s+/)[0];
    h(
      "<header><p class=\"muted\" style=\"margin:0\">You're connecting with</p><h1>" + esc(rep.name) + "</h1>" +
        (rep.title ? '<p class="muted">' + esc(rep.title) + "</p>" : "") + "</header>" +
      '<p class="muted" style="margin-top:12px">Drop your details and ' + esc(firstName) + " will follow up.</p>" +
      '<div style="margin-top:16px">' +
        leadFormHTML({ extras: false, submitLabel: "Submit", vcard: true, vcardLabel: "Save " + firstName + "'s contact" }) +
      "</div>" +
      '<div class="footer"><span class="small">Powered by Rankings.io</span></div>'
    );
    wireLeadForm({ repId: rep.rep_id, source: "qr", extras: false, rep: rep, successLabel: "Thanks — you're all set ✓" });
  }

  // ---- Boot ---------------------------------------------------------------
  function start() {
    if (!configured()) {
      h('<div class="note warn" style="margin-top:24px"><b>Not configured yet.</b><br>' +
        "Paste your Apps Script web-app URL into <code>APPS_SCRIPT_URL</code> in this file. See SETUP.md.</div>");
      return;
    }
    loadReps().then(function () {
      var cap = qs("capture");
      if (cap) viewCapture(cap); else viewHome();
    }).catch(function () {
      h('<div class="note err" style="margin-top:24px">Couldn\'t load reps. Check the connection and reload.</div>');
    });
  }

  start();
  </script>
</body>
</html>
