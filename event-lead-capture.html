<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Event Lead Capture · Revenue Kitchen</title>
  <link rel="icon" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f8fafc; color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 460px; margin: 0 auto; padding: 24px 16px 48px; min-height: 100dvh; }
    input, select, textarea { font-size: 16px; } /* no iOS zoom */
    h1 { font-size: 24px; margin: 0; }
    .muted { color: #64748b; font-size: 14px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .stack > * + * { margin-top: 16px; }

    .tile, .pickbtn {
      display: flex; align-items: center; gap: 16px; width: 100%;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
      padding: 18px 20px; text-align: left; text-decoration: none; color: inherit;
      box-shadow: 0 1px 2px rgba(15,23,42,.04); cursor: pointer; font: inherit;
      transition: transform .05s ease;
    }
    .tile:active, .pickbtn:active, .btn:active { transform: scale(.99); }
    .tile .emoji { font-size: 28px; }
    .tile b { display: block; font-size: 17px; }
    .tile span.sub { display: block; color: #64748b; font-size: 13px; }
    .pickbtn { font-weight: 600; font-size: 16px; padding: 16px 20px; }

    label.field { display: block; }
    label.field > span { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
    .ctrl {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 12px;
      padding: 12px 14px; background: #fff; outline: none;
    }
    .ctrl:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,.08); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      width: 100%; border: 0; border-radius: 12px; padding: 16px;
      font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn.primary { background: #0f172a; color: #fff; }
    .btn.primary:disabled { opacity: .5; }
    .btn.ghost { background: #fff; color: #0f172a; border: 1px solid #cbd5e1; }
    a.btn { display: block; text-align: center; text-decoration: none; }

    .link { background: none; border: 0; color: #64748b; font: inherit; cursor: pointer; padding: 0; }
    .link:hover { color: #0f172a; }

    .note { border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; }
    .note.ok { background: #ecfdf5; color: #047857; }
    .note.err { background: #fef2f2; color: #b91c1c; }
    .note.warn { background: #fffbeb; color: #b45309; }

    .qrcard { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
    .qrbox { background: #fff; border: 1px solid #e2e8f0; border-radius: 24px; padding: 22px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #0f172a; border-radius: 50%; animation: spin .8s linear infinite; margin: 48px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .center { text-align: center; }
    .small { font-size: 12px; color: #94a3b8; word-break: break-all; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="spinner" id="boot"></div>
  </div>

  <script>
  // ---- Config -------------------------------------------------------------
  // Paste your deployed Apps Script web-app /exec URL here (see SETUP.md).
  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHNIQ_wa-lShX9dPHmNnTGRG947V4lUf6II7buL-TSTyv4qSGq85btK2fZWzcCcjOykA/exec";
  // Base URL used to build the QR target (this page).
  var APP_URL = location.origin + location.pathname;
  var STORAGE_KEY = "rk.elc.activeRepId";

  // ---- Tiny helpers -------------------------------------------------------
  var app = document.getElementById("app");
  function h(html) { app.innerHTML = html; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }
  function qs(name) { return new URLSearchParams(location.search).get(name); }
  function configured() { return APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf("PASTE_YOUR") === -1; }

  var reps = [];
  function repById(id) { for (var i = 0; i < reps.length; i++) if (reps[i].rep_id === id) return reps[i]; return null; }

  // ---- API ----------------------------------------------------------------
  function loadReps() {
    return fetch(APPS_SCRIPT_URL + "?action=reps")
      .then(function (r) { return r.json(); })
      .then(function (d) { reps = (d && d.reps) || []; return reps; });
  }
  function postAction(payload) {
    // text/plain avoids the CORS preflight Apps Script can't answer.
    return fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    }).then(function (r) { return r.json(); });
  }

  // ---- Image downscale for OCR -------------------------------------------
  function fileToJpeg(file, maxEdge) {
    maxEdge = maxEdge || 1400;
    return createImageBitmap(file).then(function (bm) {
      var scale = Math.min(1, maxEdge / Math.max(bm.width, bm.height));
      var w = Math.round(bm.width * scale), hh = Math.round(bm.height * scale);
      var c = document.createElement("canvas"); c.width = w; c.height = hh;
      c.getContext("2d").drawImage(bm, 0, 0, w, hh);
      return c.toDataURL("image/jpeg", 0.85);
    });
  }

  // ---- vCard (built client-side from the rep row) -------------------------
  function downloadVCard(rep) {
    function e(v) { return String(v || "").replace(/\\/g, "\\\\").replace(/\n/g, "\\n").replace(/,/g, "\\,").replace(/;/g, "\\;"); }
    var parts = rep.name.trim().split(/\s+/);
    var first = parts[0] || "", last = parts.slice(1).join(" ");
    var lines = ["BEGIN:VCARD", "VERSION:3.0", "N:" + e(last) + ";" + e(first) + ";;;", "FN:" + e(rep.name)];
    if (rep.company) lines.push("ORG:" + e(rep.company));
    if (rep.title) lines.push("TITLE:" + e(rep.title));
    if (rep.email) lines.push("EMAIL;TYPE=WORK:" + e(rep.email));
    if (rep.phone) lines.push("TEL;TYPE=WORK,VOICE:" + e(rep.phone));
    lines.push("END:VCARD");
    var blob = new Blob([lines.join("\r\n")], { type: "text/vcard" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = (rep.rep_id || "contact") + ".vcf";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  // ---- Lead form markup + wiring (shared) ---------------------------------
  function leadFormHTML(opts) {
    // opts: { extras:bool, submitLabel, vcard:bool }
    var extras = opts.extras
      ? '<label class="field"><span>Contact type</span>' +
          '<select class="ctrl" id="f_type">' +
          ["Lead", "Vendor", "Partner", "Client", "Other"].map(function (t) {
            return '<option value="' + t + '">' + t + "</option>"; }).join("") +
          "</select></label>" +
        '<label class="field"><span>Notes</span><textarea class="ctrl" id="f_notes" rows="3"></textarea></label>'
      : "";
    var vcard = opts.vcard
      ? '<button class="btn ghost" id="f_vcard" type="button">' + esc(opts.vcardLabel || "Save rep's contact") + "</button>"
      : "";
    return (
      '<form id="leadform" class="stack">' +
        '<div class="grid2">' +
          '<label class="field"><span>First name</span><input class="ctrl" id="f_first" autocomplete="given-name" /></label>' +
          '<label class="field"><span>Last name</span><input class="ctrl" id="f_last" autocomplete="family-name" /></label>' +
        "</div>" +
        '<label class="field"><span>Firm name</span><input class="ctrl" id="f_firm" autocomplete="organization" /></label>' +
        '<label class="field"><span>Email</span><input class="ctrl" id="f_email" type="email" inputmode="email" autocomplete="email" /></label>' +
        extras +
        '<button class="btn primary" id="f_submit" type="submit">' + esc(opts.submitLabel || "Save lead") + "</button>" +
        '<div id="f_msg"></div>' +
        vcard +
      "</form>"
    );
  }

  function wireLeadForm(opts) {
    // opts: { repId, source, extras, rep (for vcard), successLabel, onSaved }
    var form = document.getElementById("leadform");
    var msg = document.getElementById("f_msg");
    var vc = document.getElementById("f_vcard");
    if (vc && opts.rep) vc.addEventListener("click", function () { downloadVCard(opts.rep); });

    form.addEventListener("submit", function (ev) {
      ev.preventDefault();
      var btn = document.getElementById("f_submit");
      btn.disabled = true; btn.textContent = "Saving…"; msg.innerHTML = "";

      var payload = {
        action: "lead",
        rep_id: opts.repId,
        source: opts.source,
        first_name: val("f_first"),
        last_name: val("f_last"),
        firm: val("f_firm"),
        email: val("f_email"),
        contact_type: opts.extras ? val("f_type") : "Lead",
        notes: opts.extras ? val("f_notes") : "",
      };

      postAction(payload).then(function (res) {
        btn.disabled = false; btn.textContent = opts.submitLabel || "Save lead";
        if (res && res.ok) {
          msg.innerHTML = '<div class="note ok">' + esc(opts.successLabel || "Lead saved ✓") + "</div>";
          form.reset();
          if (opts.onSaved) opts.onSaved();
        } else {
          msg.innerHTML = '<div class="note err">' + esc((res && res.error) || "Could not save") + "</div>";
        }
      }).catch(function () {
        btn.disabled = false; btn.textContent = opts.submitLabel || "Save lead";
        msg.innerHTML = '<div class="note err">Network error — try again.</div>';
      });
    });
  }
  function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ""; }
  function setVal(id, v) { var el = document.getElementById(id); if (el) el.value = v || ""; }

  // ---- Views --------------------------------------------------------------
  function viewPicker() {
    h(
      "<h1>Who are you?</h1>" +
      '<p class="muted">Pick your name once — we\'ll remember it on this device.</p>' +
      '<div class="stack" style="margin-top:20px">' +
        reps.map(function (r) {
          return '<button class="pickbtn" data-id="' + esc(r.rep_id) + '">' + esc(r.name) + "</button>";
        }).join("") +
      "</div>"
    );
    Array.prototype.forEach.call(document.querySelectorAll(".pickbtn"), function (b) {
      b.addEventListener("click", function () {
        localStorage.setItem(STORAGE_KEY, b.getAttribute("data-id"));
        viewHome();
      });
    });
  }

  function viewHome() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewPicker();
    h(
      '<div class="row">' +
        "<div><p class=\"muted\" style=\"margin:0\">Capturing as</p><h1>" + esc(rep.name) + "</h1></div>" +
        '<button class="link" id="switch">Switch</button>' +
      "</div>" +
      '<div class="stack" style="margin-top:28px">' +
        tile("qr", "🔳", "My QR code", "Let a lead scan to fill the form") +
        tile("scan", "📷", "Scan a card", "Photo → auto-fill → save") +
        tile("manual", "⌨️", "Manual entry", "Type it in or hand over the phone") +
        '<a class="tile" href="' + esc(rep.scheduling_url) + '" target="_blank" rel="noopener">' +
          '<span class="emoji">📅</span><span><b>Schedule appointment</b><span class="sub">Open your booking link</span></span></a>' +
      "</div>"
    );
    document.getElementById("switch").addEventListener("click", function () {
      localStorage.removeItem(STORAGE_KEY); viewPicker();
    });
    bindNav();
  }
  function tile(route, emoji, title, sub) {
    return '<button class="tile" data-route="' + route + '"><span class="emoji">' + emoji +
      '</span><span><b>' + esc(title) + '</b><span class="sub">' + esc(sub) + "</span></span></button>";
  }
  function bindNav() {
    Array.prototype.forEach.call(document.querySelectorAll(".tile[data-route]"), function (t) {
      t.addEventListener("click", function () {
        var r = t.getAttribute("data-route");
        if (r === "qr") viewQR();
        else if (r === "scan") viewScan();
        else if (r === "manual") viewManual();
      });
    });
  }

  function backBar(rep) {
    return '<div class="row"><button class="link" id="back">← Back</button><span class="muted">' +
      esc(rep.name) + "</span></div>";
  }
  function bindBack() {
    var b = document.getElementById("back");
    if (b) b.addEventListener("click", viewHome);
  }

  function viewManual() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewHome();
    h(backBar(rep) + '<h1 style="margin-top:16px">Manual entry</h1>' +
      '<div style="margin-top:16px">' + leadFormHTML({ extras: true, submitLabel: "Save lead" }) + "</div>");
    bindBack();
    wireLeadForm({ repId: rep.rep_id, source: "manual", extras: true });
  }

  function viewQR() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewHome();
    var url = APP_URL + "?capture=" + encodeURIComponent(rep.rep_id);
    h(backBar(rep) + '<h1 style="margin-top:16px">My QR code</h1>' +
      '<div class="qrcard" style="margin-top:20px">' +
        '<p class="muted">Have the lead point their camera here. It opens your capture form.</p>' +
        '<div class="qrbox" id="qrbox"></div>' +
        "<p style=\"font-weight:600;font-size:18px;margin:0\">" + esc(rep.name) + "</p>" +
        '<p class="small">' + esc(url) + "</p>" +
      "</div>");
    bindBack();
    renderQR(document.getElementById("qrbox"), url, 256);
  }

  // Render a QR into `box`. Primary: the qrious library (canvas). Fallback:
  // an image service, so the code still shows if the library didn't load.
  function renderQR(box, url, size) {
    box.innerHTML = "";
    try {
      if (typeof QRious === "function") {
        var canvas = document.createElement("canvas");
        box.appendChild(canvas);
        new QRious({ element: canvas, value: url, size: size, level: "M", padding: 8 });
        return;
      }
    } catch (e) { /* fall through to image */ }
    var img = document.createElement("img");
    img.width = size; img.height = size; img.alt = "QR code";
    img.src = "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size +
      "&margin=8&data=" + encodeURIComponent(url);
    box.appendChild(img);
  }

  function viewScan() {
    var rep = repById(localStorage.getItem(STORAGE_KEY));
    if (!rep) return viewHome();
    h(backBar(rep) + '<h1 style="margin-top:16px">Scan a card</h1>' +
      '<div id="scanbody" style="margin-top:16px"></div>' +
      '<input id="file" type="file" accept="image/*" capture="environment" class="hidden" />');
    bindBack();

    var fileEl = document.getElementById("file");
    var bodyEl = document.getElementById("scanbody");

    function showStart(reading) {
      bodyEl.innerHTML =
        '<p class="muted">Take a photo of the card or badge. We\'ll auto-fill what we can read — you confirm before saving.</p>' +
        '<button class="btn primary" id="shoot" ' + (reading ? "disabled" : "") + ' style="margin-top:14px">' +
        (reading ? "Reading…" : "📷 Take / choose photo") + "</button>";
      var s = document.getElementById("shoot");
      if (s && !reading) s.addEventListener("click", function () { fileEl.click(); });
    }
    function showConfirm(fields, warn) {
      bodyEl.innerHTML =
        (warn ? '<div class="note warn">' + esc(warn) + "</div>" : "") +
        '<p class="muted" style="margin-top:8px">Check the fields, fix any misreads, then save.</p>' +
        '<div style="margin-top:12px">' + leadFormHTML({ extras: true, submitLabel: "Save lead" }) + "</div>" +
        '<button class="btn ghost" id="again" style="margin-top:12px">Scan another card</button>';
      setVal("f_first", fields.firstName); setVal("f_last", fields.lastName);
      setVal("f_firm", fields.firm); setVal("f_email", fields.email);
      wireLeadForm({ repId: rep.rep_id, source: "card", extras: true });
      document.getElementById("again").addEventListener("click", function () { showStart(false); fileEl.click(); });
    }

    fileEl.addEventListener("change", function (ev) {
      var file = ev.target.files && ev.target.files[0];
      ev.target.value = "";
      if (!file) return;
      showStart(true);
      fileToJpeg(file).then(function (dataUrl) {
        return postAction({ action: "ocr", image: dataUrl, mediaType: "image/jpeg" });
      }).then(function (fields) {
        showConfirm(fields || { firstName: "", lastName: "", firm: "", email: "" });
      }).catch(function () {
        showConfirm({ firstName: "", lastName: "", firm: "", email: "" }, "Couldn't read the card — fill it in by hand.");
      });
    });

    showStart(false);
  }

  // Public capture view (a lead who scanned a rep's QR). No rep picker.
  function viewCapture(repId) {
    var rep = repById(repId);
    if (!rep) {
      h('<div class="center" style="margin-top:64px"><h1>Link not found</h1>' +
        '<p class="muted">This QR code isn\'t recognized. Please ask the rep to try again.</p></div>');
      return;
    }
    var firstName = rep.name.split(/\s+/)[0];
    h(
      "<header><p class=\"muted\" style=\"margin:0\">You're connecting with</p><h1>" + esc(rep.name) + "</h1>" +
        (rep.title ? '<p class="muted">' + esc(rep.title) + "</p>" : "") + "</header>" +
      '<p class="muted" style="margin-top:12px">Drop your details and ' + esc(firstName) + " will follow up.</p>" +
      '<div style="margin-top:16px">' +
        leadFormHTML({ extras: false, submitLabel: "Submit", vcard: true, vcardLabel: "Save " + firstName + "'s contact" }) +
      "</div>"
    );
    wireLeadForm({
      repId: rep.rep_id, source: "qr", extras: false, rep: rep,
      successLabel: "Thanks — you're all set ✓",
    });
  }

  // ---- Boot ---------------------------------------------------------------
  function fatal(msg) {
    h('<div class="note err" style="margin-top:32px">' + esc(msg) + "</div>");
  }

  function start() {
    if (!configured()) {
      h('<div class="note warn" style="margin-top:32px"><b>Not configured yet.</b><br>' +
        "Paste your Apps Script web-app URL into <code>APPS_SCRIPT_URL</code> in this file. See SETUP.md.</div>");
      return;
    }
    loadReps().then(function () {
      var cap = qs("capture");
      if (cap) viewCapture(cap);
      else viewHome();
    }).catch(function () {
      fatal("Couldn't load reps. Check the connection and reload.");
    });
  }

  start();
  </script>
</body>
</html>
