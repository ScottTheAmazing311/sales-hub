<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Service Menu Builder — Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:wght@400&family=DM+Sans:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<style>
  :root{--navy:#07374F;--navy-2:#0e5f87;--cream:#fefaed;--white:#fff;--yellow:#eaff6a;--yellow-warm:#eedc82;--blue:#3c94d1;--dark:#2c2c2c;--muted:#6b6b6b;--line:rgba(7,55,79,.14);
    --head:'DM Serif Display',Georgia,serif;--body:'DM Sans',-apple-system,sans-serif;--mono:'Roboto Mono','SF Mono',monospace;}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--body);background:var(--cream);color:var(--dark)}
  button{cursor:pointer;font-family:inherit}
  #gate{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:100}
  #gate .box{background:var(--cream);border-radius:14px;padding:2.5rem 2.2rem;width:340px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  #gate h1{font-family:var(--head);color:var(--navy);font-size:1.4rem;margin-bottom:.3rem}
  #gate p{color:var(--muted);font-size:.85rem;margin-bottom:1.2rem}
  #gate input{width:100%;padding:.7rem .9rem;border:2px solid var(--line);border-radius:9px;font-size:1rem;font-family:var(--mono);text-align:center;letter-spacing:.3em}
  #gate button{margin-top:.9rem;width:100%;padding:.7rem;background:var(--navy);color:var(--yellow);border:none;border-radius:9px;font-weight:600}
  #gate .err{color:#c0392b;font-size:.8rem;min-height:1rem;margin-top:.5rem}
  .top{background:var(--navy);color:var(--white);padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:20}
  .top .t-title{font-family:var(--head);font-size:1.15rem}
  .top .t-title small{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--yellow);display:block}
  .top .actions{display:flex;gap:.5rem;flex-wrap:wrap}
  .top button{border:none;border-radius:999px;padding:.5rem 1rem;font-size:.82rem;font-weight:600}
  .btn-gen{background:var(--yellow);color:var(--navy)}.btn-full{background:var(--blue);color:var(--white)}
  .btn-save{background:var(--white);color:var(--navy)}.btn-reset{background:transparent;color:var(--yellow);border:1px solid rgba(255,255,255,.3)!important}
  .dirty-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--yellow-warm);margin-left:.4rem;vertical-align:middle;opacity:0}
  .dirty .dirty-dot{opacity:1}
  .shell{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 56px)}
  .side{border-right:1px solid var(--line);background:var(--white);padding:.8rem;overflow-y:auto}
  .side .grp{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:1rem .4rem .3rem}
  .side .grp:first-child{margin-top:.2rem}
  .side a{display:block;padding:.45rem .6rem;border-radius:8px;font-size:.86rem;color:var(--dark);text-decoration:none;cursor:pointer}
  .side a:hover{background:rgba(7,55,79,.06)}
  .side a.active{background:var(--navy);color:var(--white);font-weight:600}
  .side a.retired{color:var(--muted);font-style:italic}
  .main{padding:1.6rem 1.8rem;max-width:920px}
  .main h2{font-family:var(--head);color:var(--navy);font-size:1.6rem;margin-bottom:.15rem}
  .main .hint{color:var(--muted);font-size:.85rem;margin-bottom:1.2rem}
  .src{font-family:var(--mono);font-size:.72rem;color:var(--navy-2);background:rgba(60,148,209,.1);border-radius:8px;padding:.5rem .8rem;margin-bottom:1.1rem}
  .src a{color:var(--navy);font-weight:600}
  .field{margin-bottom:1rem}
  .field label{display:block;font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin-bottom:.3rem}
  .field input,.field textarea{width:100%;padding:.55rem .7rem;border:1px solid var(--line);border-radius:8px;font-family:var(--body);font-size:.9rem;background:var(--white)}
  .field textarea{min-height:5rem;resize:vertical;line-height:1.5}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--navy)}
  .card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:1.1rem 1.2rem;margin-bottom:1.1rem}
  .card h3{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);margin-bottom:.7rem}
  table.medit{width:100%;border-collapse:collapse;font-size:.8rem}
  table.medit td{padding:.22rem;border-bottom:1px solid var(--line);vertical-align:middle}
  table.medit thead td{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;color:var(--navy);text-align:center;font-weight:600}
  table.medit td input{width:100%;padding:.32rem .4rem;border:1px solid transparent;border-radius:6px;font-size:.8rem;background:rgba(7,55,79,.03)}
  table.medit td input:focus{outline:none;border-color:var(--navy);background:var(--white)}
  table.medit td.lbl input{font-weight:500}
  table.medit tr.grp-row td{background:rgba(7,55,79,.07);font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);font-weight:600;padding:.35rem}
  table.medit tr.price-row td:first-child input{font-family:var(--mono);font-weight:600}
  .rowtool{width:30px;text-align:center}
  .del-btn{border:none;background:transparent;color:#c0392b;font-size:.95rem;line-height:1;padding:.2rem .35rem;border-radius:5px;opacity:.5;cursor:pointer}
  .del-btn:hover{opacity:1;background:rgba(192,57,43,.12)}
  tr.addrow td{border-bottom:none;padding:.45rem .22rem}
  .add-btn{border:1px dashed var(--line);background:transparent;color:var(--navy);font-size:.7rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;padding:.35rem .8rem;border-radius:6px;cursor:pointer}
  .add-btn:hover{background:rgba(7,55,79,.05);border-color:var(--navy)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
  .tier-edit{border:1px solid var(--line);border-radius:10px;padding:.6rem .7rem}
  .tier-edit.off{opacity:.45;background:rgba(7,55,79,.03)}
  .tier-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.7rem}
  .tier-row .tier-edit{flex:1;min-width:130px}
  .tgl{display:flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.66rem;text-transform:uppercase;color:var(--navy);font-weight:600;margin-bottom:.4rem;cursor:pointer}
  .tgl input{width:15px;height:15px;accent-color:var(--navy)}
  .tier-edit.off .tgl{color:var(--muted)}
  .savebar{background:var(--yellow-warm);border-radius:10px;padding:.7rem 1rem;font-size:.82rem;color:var(--navy);margin-bottom:1.1rem}
  .reslist a{color:var(--navy-2);font-weight:600}
  @media(max-width:760px){.shell{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app" style="display:none">
  <div class="top" id="top">
    <div class="t-title">Service Menu Builder<small>Rankings · Attorney Rankings Org</small></div>
    <div class="actions">
      <button class="btn-gen" onclick="generate('page')">Generate this page<span class="dirty-dot"></span></button>
      <button class="btn-full" onclick="generate('full')">Generate full menu</button>
      <button class="btn-save" onclick="saveMaster()">Save to master</button>
      <button class="btn-reset" onclick="resetChanges()">Reset</button>
    </div>
  </div>
  <div class="shell"><nav class="side" id="side"></nav><main class="main" id="editor"></main></div>
</div>

<script>
const PW='1776';
const $=(s,p=document)=>p.querySelector(s);
const clone=o=>JSON.parse(JSON.stringify(o));
let master=null,state=null,current=null;

async function openApp(){
  $('#app').style.display='';
  master=await (await fetch('menu.json',{cache:'no-store'})).json();
  state=clone(master);
  current=state.sections[0].offers[0];
  buildSide();renderEditor();
}
openApp();

const isDirty=()=>JSON.stringify(state)!==JSON.stringify(master);
function markDirty(){ $('#top').classList.toggle('dirty',isDirty()); }
const escAttr=s=>String(s==null?'':s).replace(/"/g,'&quot;').replace(/</g,'&lt;');
function setPath(obj,path,val){const p=path.split('.');let o=obj;for(let i=0;i<p.length-1;i++){o=o[p[i].match(/^\d+$/)?+p[i]:p[i]];}const l=p[p.length-1];o[l.match(/^\d+$/)?+l:l]=val;}

function buildSide(){
  let h='';
  state.sections.forEach(sec=>{
    h+=`<div class="grp">${sec.name}${sec.internal?' · <span style="color:var(--yellow-warm)">hidden from hub</span>':''}</div>`;
    if(sec.kind==='offers'){
      sec.offers.forEach(k=>{const o=state.offers[k];if(!o)return;h+=`<a data-key="${k}" class="${k===current?'active':''}${o.retired?' retired':''}" onclick="select('${k}')">${escAttr(o.name)}</a>`;});
    } else {
      h+=`<a data-key="${sec.key}" class="${sec.key===current?'active':''}" onclick="select('${sec.key}')">${sec.name}</a>`;
    }
  });
  $('#side').innerHTML=h;
}
function select(k){current=k;document.querySelectorAll('.side a').forEach(a=>a.classList.toggle('active',a.dataset.key===k));renderEditor();}

function field(label,path,val,area){
  if(area)return `<div class="field">${label?`<label>${label}</label>`:''}<textarea data-path="${path}" data-arr="1">${escAttr(Array.isArray(val)?val.join('\n'):(val||''))}</textarea></div>`;
  return `<div class="field">${label?`<label>${label}</label>`:''}<input data-path="${path}" value="${escAttr(val)}"></div>`;
}

function renderEditor(){
  const el=$('#editor');
  if(state.offers&&state.offers[current]){ el.innerHTML=editOffer(state.offers[current],current); }
  else{
    const sec=state.sections.find(s=>s.key===current);
    if(sec&&sec.kind==='resources')el.innerHTML=editResources();
    else if(sec&&sec.kind==='list')el.innerHTML=editPimcon(sec.list);
    else el.innerHTML='<p class="hint">Select an item.</p>';
  }
  wireInputs();
}

function editOffer(o,key){
  const b=`offers.${key}`;
  let h=`<h2>${escAttr(o.name)}</h2><p class="hint">${o.retired?'Retired offer · ':''}Edit fields below. Changes are session-only until you Save to master.</p>`;
  if(o.source)h+=`<div class="src">Source of truth: <a href="https://drive.google.com/file/d/${o.source.driveId}/view" target="_blank">${escAttr(o.source.name)}</a> — when this doc changes, re-sync and update the matrix here.</div>`;
  h+=field('Name',`${b}.name`,o.name);
  if('tagline' in o)h+=field('Tagline',`${b}.tagline`,o.tagline);
  h+=field('Blurb',`${b}.blurb`,o.blurb,true);
  if(o.kind==='matrix'){
    // tiers with toggles
    h+='<div class="card"><h3>Tiers</h3><p class="hint" style="margin:-.3rem 0 .7rem">Uncheck a tier to leave it out of the generated page.</p><div class="tier-row">';
    o.tiers.forEach((t,i)=>{h+=`<div class="tier-edit${t.hidden?' off':''}"><label class="tgl"><input type="checkbox" data-toggle="${b}.tiers.${i}.hidden" ${t.hidden?'':'checked'}> Include</label><div class="field" style="margin:0"><input data-path="${b}.tiers.${i}.name" value="${escAttr(t.name)}"></div></div>`;});
    h+='</div></div>';
    // matrix
    h+='<div class="card"><h3>Service Matrix</h3><table class="medit"><tbody>';
    o.groups.forEach((g,gi)=>{
      h+=`<tr class="grp-row"><td colspan="${o.tiers.length+1}"><input data-path="${b}.groups.${gi}.name" value="${escAttr(g.name)}" style="font-weight:600;background:transparent"></td><td class="rowtool"><button class="del-btn" title="Delete this section + its rows" onclick="delGroup('${key}',${gi})">✕</button></td></tr>`;
      g.items.forEach((it,ii)=>{
        h+=`<tr><td class="lbl"><input data-path="${b}.groups.${gi}.items.${ii}.label" value="${escAttr(it.label)}"></td>`;
        it.values.forEach((v,vi)=>{h+=`<td><input data-path="${b}.groups.${gi}.items.${ii}.values.${vi}" value="${escAttr(v)}" style="text-align:center"></td>`;});
        h+=`<td class="rowtool"><button class="del-btn" title="Delete row" onclick="delItem('${key}',${gi},${ii})">✕</button></td></tr>`;
      });
      h+=`<tr class="addrow"><td colspan="${o.tiers.length+2}"><button class="add-btn" onclick="addItem('${key}',${gi})">+ Add row</button></td></tr>`;
    });
    h+=`<tr class="addrow"><td colspan="${o.tiers.length+2}"><button class="add-btn" onclick="addGroup('${key}')">+ Add section</button></td></tr>`;
    h+='</tbody></table></div>';
    // price rows
    h+='<div class="card"><h3>Pricing Rows</h3><table class="medit"><tbody>';
    (o.priceRows||[]).forEach((p,pi)=>{
      h+=`<tr class="price-row"><td class="lbl"><input data-path="${b}.priceRows.${pi}.label" value="${escAttr(p.label)}"></td>`;
      p.values.forEach((v,vi)=>{h+=`<td><input data-path="${b}.priceRows.${pi}.values.${vi}" value="${escAttr(v)}" style="text-align:center"></td>`;});
      h+=`<td class="rowtool"><button class="del-btn" title="Delete price row" onclick="delPrice('${key}',${pi})">✕</button></td></tr>`;
    });
    h+=`<tr class="addrow"><td colspan="${o.tiers.length+2}"><button class="add-btn" onclick="addPrice('${key}')">+ Add price row</button></td></tr>`;
    h+='</tbody></table></div>';
    if(o.notes&&o.notes.length){
      h+='<div class="card"><h3>Notes</h3>';
      o.notes.forEach((n,ni)=>{h+=field('Title',`${b}.notes.${ni}.title`,n.title)+field('Body',`${b}.notes.${ni}.body`,n.body,true);});
      h+='</div>';
    }
    h+=field('Footnote',`${b}.footnote`,o.footnote,true);
  } else {
    h+=field('Price',`${b}.price`,o.price);
    h+='<div class="card"><h3>Details (one per line)</h3>'+field('',`${b}.details`,o.details,true)+'</div>';
    h+=field('Footnote',`${b}.footnote`,o.footnote,true);
  }
  return h;
}

function editResources(){
  let h='<h2>Resources</h2><p class="hint">These link live to Drive — update the file in Drive and the link serves the new version automatically. No editing needed here.</p><div class="card reslist"><table class="medit"><tbody>';
  (state.resources||[]).forEach(r=>{h+=`<tr><td>${escAttr(r.name)}</td><td>${(r.type||'').toUpperCase()}</td><td><a href="https://drive.google.com/file/d/${r.driveId}/view" target="_blank">Open ↗</a></td></tr>`;});
  h+='</tbody></table></div>';
  return h;
}
function editPimcon(listKey){
  let h='<h2>PIMCon</h2><p class="hint">Sponsorship tiers. Edit names and prices; session-only until you Save to master.</p><div class="card"><table class="medit"><tbody>';
  (state[listKey]||[]).forEach((p,i)=>{h+=`<tr><td class="lbl"><input data-path="${listKey}.${i}.name" value="${escAttr(p.name)}"></td><td><input data-path="${listKey}.${i}.price" value="${escAttr(p.price)}" style="text-align:right"></td><td class="rowtool"><button class="del-btn" title="Delete" onclick="delPimcon(${i})">✕</button></td></tr>`;});
  h+=`<tr class="addrow"><td colspan="3"><button class="add-btn" onclick="addPimcon()">+ Add sponsorship</button></td></tr>`;
  h+='</tbody></table></div>';
  return h;
}

// ── Structural editing: add/delete rows & sections (session-only until Save) ──
function delItem(key,gi,ii){ state.offers[key].groups[gi].items.splice(ii,1); markDirty(); renderEditor(); }
function addItem(key,gi){ var o=state.offers[key]; o.groups[gi].items.push({label:'New line',values:o.tiers.map(function(){return '✓';})}); markDirty(); renderEditor(); }
function delGroup(key,gi){ if(!confirm('Delete this whole section and all its rows?'))return; state.offers[key].groups.splice(gi,1); markDirty(); renderEditor(); }
function addGroup(key){ state.offers[key].groups.push({name:'New Section',items:[]}); markDirty(); renderEditor(); }
function delPrice(key,pi){ state.offers[key].priceRows.splice(pi,1); markDirty(); renderEditor(); }
function addPrice(key){ var o=state.offers[key]; (o.priceRows=o.priceRows||[]).push({label:'New price row',values:o.tiers.map(function(){return '';})}); markDirty(); renderEditor(); }
function delPimcon(i){ state.pimcon.splice(i,1); markDirty(); renderEditor(); }
function addPimcon(){ state.pimcon.push({name:'New Sponsorship',price:'$0'}); markDirty(); renderEditor(); }

function wireInputs(){
  $('#editor').querySelectorAll('[data-path]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      let v=inp.value;
      if(inp.dataset.arr)v=v.split('\n').map(s=>s.trim()).filter(x=>x.length);
      setPath(state,inp.dataset.path,v);markDirty();
      if(inp.dataset.path.endsWith('.name'))buildSide();
    });
  });
  $('#editor').querySelectorAll('[data-toggle]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      setPath(state,cb.dataset.toggle,!cb.checked);
      const box=cb.closest('.tier-edit');if(box)box.classList.toggle('off',!cb.checked);
      markDirty();
    });
  });
}

function generate(mode){
  const c=mode==='full'?'full':current;
  let url='render.html?c='+encodeURIComponent(c)+'&_='+Date.now();
  if(isDirty())url+='#d='+LZString.compressToEncodedURIComponent(JSON.stringify(state));
  window.open(url,'_blank');
}
function resetChanges(){ if(isDirty()&&!confirm('Discard your session changes?'))return; state=clone(master);markDirty();buildSide();renderEditor(); }
function saveMaster(){
  const pw=prompt('Enter master password to save to the template:');
  if(pw===null)return;
  if(pw!==PW){alert('Incorrect password — not saved.');return;}
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='menu.json';a.click();URL.revokeObjectURL(a.href);
  master=clone(state);markDirty();
  alert('Downloaded updated menu.json.\n\nTo publish: replace builder/menu.json with this file and redeploy. (Seamless in-app save is a later phase.)');
}
</script>
</body>
</html>
