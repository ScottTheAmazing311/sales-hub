<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Rankings — Service Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:wght@400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<style>
  :root{
    --navy:#07374F; --navy-2:#0e5f87; --cream:#fefaed; --white:#fff;
    --yellow:#eaff6a; --yellow-warm:#eedc82; --blue:#3c94d1; --dark:#2c2c2c;
    --muted:#6b6b6b; --line:rgba(7,55,79,.12);
    --head:'DM Serif Display',Georgia,serif; --body:'DM Sans',-apple-system,sans-serif; --mono:'DM Mono','SF Mono',monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--body);background:var(--cream);color:var(--dark);line-height:1.5}
  .wrap{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
  .brandbar{background:var(--navy);color:var(--white);padding:1.4rem 1.5rem;border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.8rem}
  .brandbar .b-title{font-family:var(--head);font-size:1.5rem;letter-spacing:.2px}
  .brandbar .b-sub{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.14em;color:var(--yellow)}
  h1.section-title{font-family:var(--head);font-size:2rem;color:var(--navy);margin-bottom:.35rem}
  .blurb{color:var(--muted);font-size:1rem;max-width:70ch;margin-bottom:1.6rem}
  .block{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:1.5rem 1.6rem;margin-bottom:1.4rem;box-shadow:0 1px 0 rgba(7,55,79,.03)}
  .block h2{font-family:var(--head);font-size:1.3rem;color:var(--navy);margin-bottom:.2rem}
  .block .price-lead{font-family:var(--mono);color:var(--navy-2);font-weight:600;font-size:.95rem;margin-bottom:.8rem}
  /* flagship matrix */
  table.matrix{width:100%;border-collapse:collapse;font-size:.86rem}
  table.matrix th,table.matrix td{text-align:left;padding:.5rem .6rem;border-bottom:1px solid var(--line);vertical-align:top}
  table.matrix thead th{background:var(--navy);color:var(--white);font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0}
  table.matrix thead th.tier .tname{display:block;font-family:var(--body);font-size:.82rem;text-transform:none;letter-spacing:0;font-weight:600;margin-top:2px}
  table.matrix thead th.tier .tprice{display:block;color:var(--yellow);margin-top:2px}
  table.matrix td.val{text-align:center;font-weight:500;white-space:nowrap}
  table.matrix tr.group td{background:rgba(7,55,79,.06);font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);font-weight:600}
  table.matrix tr.invest td{border-top:2px solid var(--navy)}
  table.matrix tr.invest td.val{font-family:var(--mono);font-weight:600;color:var(--navy);font-size:1rem}
  table.matrix tr.invest td:first-child{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy)}
  .yes{color:#16a34a;font-weight:700}.no{color:#c0392b}
  /* included / tiers / simple */
  ul.checklist{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:.35rem .9rem;margin:.4rem 0}
  ul.checklist li{position:relative;padding-left:1.3rem;font-size:.9rem}
  ul.checklist li::before{content:'✔';position:absolute;left:0;color:#16a34a;font-weight:700}
  .ptier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.7rem;margin-top:1rem}
  .ptier{border:1px solid var(--line);border-radius:10px;padding:.85rem;text-align:center}
  .ptier .pt-label{font-size:.78rem;color:var(--muted)}
  .ptier .pt-price{font-family:var(--mono);font-weight:600;color:var(--navy);font-size:1.1rem;margin-top:.25rem}
  .tiers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.7rem;margin:.4rem 0 1rem}
  .tier-card{border:1px solid var(--line);border-radius:10px;padding:.9rem;text-align:center}
  .tier-card .tc-name{font-family:var(--head);color:var(--navy);font-size:1.05rem}
  .tier-card .tc-spec{font-size:.82rem;color:var(--muted);margin:.15rem 0}
  .tier-card .tc-price{font-family:var(--mono);font-weight:600;color:var(--navy-2)}
  ul.plain{margin:.4rem 0 0 1.1rem}ul.plain li{font-size:.9rem;margin-bottom:.25rem}
  .pill{display:inline-block;font-family:var(--mono);font-size:.72rem;background:var(--yellow);color:var(--navy);border-radius:999px;padding:.15rem .6rem;font-weight:600}
  .footnote{font-size:.78rem;color:var(--muted);font-style:italic;margin-top:.7rem}
  .full-lead{margin:2.2rem 0 1rem;font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--navy);border-top:1px solid var(--line);padding-top:1rem}
  /* toolbar */
  .toolbar{position:fixed;bottom:1rem;right:1rem;display:flex;gap:.5rem;z-index:50}
  .toolbar button{font-family:var(--body);font-weight:600;font-size:.85rem;border:none;border-radius:999px;padding:.6rem 1.1rem;cursor:pointer;background:var(--navy);color:var(--yellow);box-shadow:0 4px 14px rgba(7,55,79,.3)}
  .toolbar button:hover{background:var(--navy-2)}
  .variant-note{background:var(--yellow-warm);color:var(--navy);font-family:var(--mono);font-size:.72rem;text-align:center;padding:.4rem;border-radius:8px;margin-bottom:1rem;letter-spacing:.04em}
  @media(max-width:640px){ul.checklist{grid-template-columns:1fr}}
  @media print{
    body{background:#fff}.wrap{padding:0;max-width:none}.toolbar{display:none}
    .block,.brandbar{box-shadow:none}
    table.matrix thead th{position:static}
    a[href]::after{content:''}
  }
</style>
</head>
<body>
<div class="wrap" id="wrap"><div class="block">Loading…</div></div>
<div class="toolbar"><button onclick="window.print()">⬇ Download PDF</button></div>

<script>
const $ = (s,p=document)=>p.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function valCell(v){
  if(v==='✓'||v==='✔') return '<span class="yes">✓</span>';
  if(v==='❌'||v==='✗'||v==='x') return '<span class="no">✕</span>';
  return esc(v);
}

function renderFlagship(f){
  // Only include tiers that aren't toggled off (t.hidden). Keep original index to read matching cell values.
  const active=(f.tiers||[]).map((t,i)=>({t,i})).filter(x=>!x.t.hidden);
  let h=`<h1 class="section-title">${esc(f.name)}</h1>`;
  if(f.blurb) h+=`<p class="blurb">${esc(f.blurb)}</p>`;
  if(!active.length) return h+'<div class="block">No tiers selected.</div>';
  const span=active.length+1;
  h+='<div class="block"><table class="matrix"><thead><tr><th>Service Category</th>';
  active.forEach(({t})=>{h+=`<th class="tier">Tier ${t.num}<span class="tname">${esc(t.name)}</span><span class="tprice">${esc(t.price)}${esc(t.cadence||'')}</span></th>`;});
  h+='</tr></thead><tbody>';
  (f.groups||[]).forEach(g=>{
    h+=`<tr class="group"><td colspan="${span}">${esc(g.name)}</td></tr>`;
    (g.items||[]).forEach(it=>{
      h+=`<tr><td>${esc(it.label)}</td>`;
      active.forEach(({i})=>{h+=`<td class="val">${valCell((it.values||[])[i])}</td>`;});
      h+='</tr>';
    });
  });
  h+=`<tr class="invest"><td>Monthly Investment</td>`;
  active.forEach(({t})=>{h+=`<td class="val">${esc(t.price)}</td>`;});
  h+='</tr></tbody></table>';
  if(f.footnote) h+=`<p class="footnote">${esc(f.footnote)}</p>`;
  h+='</div>';
  return h;
}

function renderComponent(c){
  let h=`<h1 class="section-title">${esc(c.name)}</h1>`;
  if(c.group) h+=`<div style="margin-bottom:.8rem"><span class="pill">${esc(c.group)}</span>${c.timeline?` <span class="pill">${esc(c.timeline)}</span>`:''}</div>`;
  if(c.blurb) h+=`<p class="blurb">${esc(c.blurb)}</p>`;
  h+='<div class="block">';
  if(c.kind==='matrix'){
    if(c.included&&c.included.length){
      h+='<h2>What\'s Included</h2><ul class="checklist">';
      c.included.forEach(i=>h+=`<li>${esc(i)}</li>`);
      h+='</ul>';
    }
    const pts=(c.priceTiers||[]).filter(p=>!p.hidden);
    if(pts.length){
      h+='<div class="ptier-grid">';
      pts.forEach(p=>h+=`<div class="ptier"><div class="pt-label">${esc(p.label)}</div><div class="pt-price">${esc(p.price)}</div></div>`);
      h+='</div>';
    }
  } else if(c.kind==='tiers'){
    h+='<div class="tiers-grid">';
    (c.tiers||[]).filter(t=>!t.hidden).forEach(t=>h+=`<div class="tier-card"><div class="tc-name">${esc(t.name)}</div><div class="tc-spec">${esc(t.spec)}</div><div class="tc-price">${esc(t.price)}</div></div>`);
    h+='</div>';
    if(c.deliverables&&c.deliverables.length){h+='<h2 style="font-size:1rem">Deliverables</h2><ul class="plain">';c.deliverables.forEach(d=>h+=`<li>${esc(d)}</li>`);h+='</ul>';}
  } else {
    if(c.price) h+=`<div class="price-lead">${esc(c.price)}</div>`;
    if(c.details&&c.details.length){h+='<ul class="plain">';c.details.forEach(d=>h+=`<li>${esc(d)}</li>`);h+='</ul>';}
  }
  h+='</div>';
  return h;
}

function renderFull(o){
  let h=renderFlagship(o.flagship);
  const groups={};
  (o.components||[]).forEach(c=>{(groups[c.group]=groups[c.group]||[]).push(c);});
  Object.keys(groups).forEach(g=>{
    h+=`<div class="full-lead">${esc(g)}</div>`;
    groups[g].forEach(c=>{h+=renderComponent(c);});
  });
  return h;
}

async function boot(){
  const params=new URLSearchParams(location.search);
  const c=params.get('c')||'full';
  // decode edited override from hash (#d=<lz>)
  let override=null;
  const hash=new URLSearchParams(location.hash.slice(1));
  const d=hash.get('d');
  let master;
  try{ master=await (await fetch('offer-rankings.json',{cache:'no-store'})).json(); }
  catch(e){ $('#wrap').innerHTML='<div class="block">Could not load offer data.</div>'; return; }
  if(d){
    try{ override=JSON.parse(LZString.decompressFromEncodedURIComponent(d)); }catch(e){ override=null; }
  }
  const offer=override||master;
  const meta=offer.meta||master.meta||{};
  let body='';
  if(c==='full'){ body=renderFull(offer); }
  else if(c==='flagship'){ body=renderFlagship(offer.flagship); }
  else{
    const comp=(offer.components||[]).find(x=>x.key===c);
    body=comp?renderComponent(comp):`<div class="block">Unknown component: ${esc(c)}</div>`;
  }
  const head=`<div class="brandbar"><div><div class="b-title">${esc(meta.brand||'Rankings')}</div><div class="b-sub">${esc(meta.entity||'')} · Service Menu</div></div><div class="b-sub">${esc(meta.updated||'')}</div></div>`;
  const vnote=override?'<div class="variant-note">CUSTOM VERSION — not the master template</div>':'';
  $('#wrap').innerHTML=head+vnote+body;
  document.title=(c==='full'?'Full Offer':(c.charAt(0).toUpperCase()+c.slice(1)))+' — Rankings Service Menu';
}
boot();
</script>
</body>
</html>
