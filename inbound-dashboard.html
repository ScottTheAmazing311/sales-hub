    <style>
        :root {
            --navy: #07374F;
            --navy-light: #0e5f87;
            --yellow: #eaff6a;
            --yellow-warm: #eedc82;
            --cream: #fefaed;
            --bg: #f4f0e6;
            --text: #2c2c2c;
            --text-muted: #6b6b6b;
            --radius: 10px;
            --success: #22c55e;
            --destructive: #c0392b;
            --warning: #f59e0b;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);

        .btn-download {
            display: inline-flex;

            gap: 6px;

            background: var(--yellow);
            color: var(--navy);
            border: none;
            border-radius: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;

        }
        .btn-download:hover { opacity: 0.85; }

        .btn-download svg { width: 14px; height: 14px; }

        .dash {
            max-width: 1200px;

        .dash-header {

        .period-tab {

            font-size: 0.78rem;

        /* ── Tables ── */

        .report-table thead th {

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

        </button>

                <h1>Inbound Lead Tracker</h1>

                <span class="live-dot"></span>
                Live from Google Sheets
            </div>

                Week to Date
                <span class="tab-range" id="wtd-range"></span>

<script>
// ── Config ──
const SHEET_ID = '1-urPmmHtiLdJDoAXEFb4SLIfcRhojlUm8rcmLeSVwyY';
const LEAD_LOG_GID = '1007848549';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${LEAD_LOG_GID}`;

const COL = {
    NUM: 0,
    NAME: 1,
    PRACTICE: 2,
    AE: 3,
    DATE_INBOUND: 4,
    FTA_DATE: 5,
    FTA_SHOW: 6,
    AE_DATE: 7,
    CITY: 8,
    SOURCE: 9,
    MDR_TYPE: 9,   // Column J — check for "MDR Set"
    MDR_DATE: 4,   // Column E — date of the MDR set
    GOAL_TOTAL: 21,    // Column V — Total Inbound goal (optional)
    GOAL_DIRECT: 22,   // Column W
    GOAL_ORGANIC: 23,  // Column X
    GOAL_GADS: 24,     // Column Y
    GOAL_MDR: 25,      // Column Z
};

// ── Date utilities ──
const NOW = new Date();

function getMonday(d) {
    const dt = new Date(d);
    const day = dt.getDay();
    const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
    dt.setDate(diff);
    dt.setHours(0, 0, 0, 0);
    return dt;
}

function getMonthStart(d) { const dt = new Date(d); dt.setDate(1); dt.setHours(0,0,0,0); return dt; }
function getYearStart(d) { return new Date(d.getFullYear(), 0, 1); }

function formatShort(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
function formatFull(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function formatMonthYear(d) {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return months[d.getMonth()] + ' ' + d.getFullYear();
}

function parseGoogleDate(val) {
    if (typeof val === 'string' && val.startsWith('Date(')) {
        const parts = val.match(/Date\((\d+),(\d+),(\d+)\)/);
        if (parts) return new Date(parseInt(parts[1]), parseInt(parts[2]), parseInt(parts[3]));
    }
    return null;
}

function parseDateAny(cell) {
    if (!cell) return null;
    let d = parseGoogleDate(cell.v);
    if (d) return d;
    const f = (cell.f || '').trim();
    if (f) {
        const slashMatch = f.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
        if (slashMatch) {
            const year = slashMatch[3] ? (slashMatch[3].length === 2 ? 2000 + parseInt(slashMatch[3]) : parseInt(slashMatch[3])) : NOW.getFullYear();
            return new Date(year, parseInt(slashMatch[1]) - 1, parseInt(slashMatch[2]));
        }
    }
    if (typeof cell.v === 'string') {
        const d2 = new Date(cell.v);
        if (!isNaN(d2.getTime())) return d2;
    }
    return null;
}

function cellVal(cells, idx) {
    if (idx < 0 || idx >= cells.length || !cells[idx]) return '';
    return (cells[idx].f || cells[idx].v || '').toString().trim();
}

function normalizeSource(raw) {
    let s = (raw || 'Unknown').trim();
    if (!s) s = 'Unknown';
    s = s.replace(/goodle/gi, 'Google');
    // Capitalize first letter of each word
    return s.replace(/\b\w/g, c => c.toUpperCase());
}

// ── Derive status from FTA Show ──
function deriveStatus(ftaShow) {
    const show = (ftaShow || '').trim().toLowerCase();
    if (!show) return 'Pending';
    if (show === 'no') return 'No Show';
    if (show.includes('yes')) return 'Held';
    return 'Pending';
}

// ── Source color palette ──
const SOURCE_COLORS = [
    '#eaff6a', '#3c94d1', '#22c55e', '#f59e0b', '#a78bfa',
    '#fb923c', '#f472b6', '#2dd4bf', '#94a3b8', '#e879f9',
];

// ── State ──
let allLeads = [];
let allMdrSets = [];
let weeklyGoals = { total: 0, direct: 0, organic: 0, gads: 0, mdr: 0 };
let currentPeriod = 'wtd';
let charts = {};

// ── Categorize a traffic source into goal buckets ──
function sourceCategory(source) {
    const s = (source || '').toLowerCase();
    if (s.startsWith('direct')) return 'direct';
    if (s.includes('organic')) return 'organic';
    if (s.startsWith('ga ') || s.startsWith('google ads')) return 'gads';
    return null;
}

// ── Fetch data ──
async function fetchData() {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    const rows = json.table.rows;

    allLeads = [];
    allMdrSets = [];

    // Weekly goals live on row 1 (constant per-week targets)
    if (rows.length > 0) {
        const gc = rows[0].c || [];
        const num = (idx) => {
            if (idx >= gc.length || !gc[idx]) return 0;
            const v = parseFloat(gc[idx].v);
            return isNaN(v) ? 0 : v;
        };
        weeklyGoals = {
            total: num(COL.GOAL_TOTAL),
            direct: num(COL.GOAL_DIRECT),
            organic: num(COL.GOAL_ORGANIC),
            gads: num(COL.GOAL_GADS),
            mdr: num(COL.GOAL_MDR),
        };
        // If total isn't explicitly set, derive it from the inbound source goals
        if (!weeklyGoals.total) {
            weeklyGoals.total = weeklyGoals.direct + weeklyGoals.organic + weeklyGoals.gads;
        }
    }

    for (const row of rows) {
        const cells = row.c || [];

        // MDR Sets — Column J (index 9) contains "MDR Set" when it's an MDR set,
        // Column H (index 7) has the date.
        const mdrType = cellVal(cells, COL.MDR_TYPE);
        if (mdrType && mdrType.toLowerCase().includes('mdr set')) {
            const mdrDate = parseDateAny(cells[COL.MDR_DATE]);
            if (mdrDate) {
                allMdrSets.push({
                    date: mdrDate,
                    rep: '',
                    qty: 1,
                });
            }
        }

        const name = cellVal(cells, COL.NAME);
        if (!name) continue;

        const dateInbound = parseDateAny(cells[COL.DATE_INBOUND]);
        if (!dateInbound) continue;

        allLeads.push({
            name,
            practice: cellVal(cells, COL.PRACTICE),
            ae: cellVal(cells, COL.AE),
            dateInbound,
            ftaDate: parseDateAny(cells[COL.FTA_DATE]),
            ftaShow: cellVal(cells, COL.FTA_SHOW),
            aeDate: parseDateAny(cells[COL.AE_DATE]),
            city: cellVal(cells, COL.CITY),
            source: normalizeSource(cellVal(cells, COL.SOURCE)),
            status: deriveStatus(cellVal(cells, COL.FTA_SHOW)),
        });
    }

    allLeads.sort((a, b) => b.dateInbound - a.dateInbound);
}

// ── Count MDR Sets whose set-date falls within [start, end] ──
function countMdrSetsInRange(start, end) {
    return allMdrSets
        .filter(m => m.date >= start && m.date <= end)
        .reduce((sum, m) => sum + (m.qty || 1), 0);
}

// ── Count leads in each goal-category bucket ──
function getCategoryCounts(leads) {
    const out = { direct: 0, organic: 0, gads: 0, other: 0 };
    leads.forEach(l => {
        const cat = sourceCategory(l.source);
        if (cat) out[cat]++;
        else out.other++;
    });
    return out;
}

function getMdrSetsForPeriod() {
    const monday = getMonday(NOW);
    const monthStart = getMonthStart(NOW);
    const yearStart = getYearStart(NOW);
    if (currentPeriod === 'wtd') return countMdrSetsInRange(monday, NOW);
    if (currentPeriod === 'mtd') return countMdrSetsInRange(monthStart, NOW);
    if (currentPeriod === 'ytd') return countMdrSetsInRange(yearStart, NOW);
    if (currentPeriod === 'wow') {
        const start = new Date(monday);
        start.setDate(start.getDate() - 7 * 51);
        return countMdrSetsInRange(start, NOW);
    }
    return 0;
}

// ── Filter leads by period ──
function getFilteredLeads() {
    const monday = getMonday(NOW);
    const monthStart = getMonthStart(NOW);
    const yearStart = getYearStart(NOW);

    if (currentPeriod === 'wtd') {
        return allLeads.filter(l => l.dateInbound >= monday && l.dateInbound <= NOW);
    } else if (currentPeriod === 'mtd') {
        return allLeads.filter(l => l.dateInbound >= monthStart && l.dateInbound <= NOW);
    } else if (currentPeriod === 'wow') {
        // WoW shows trailing 52 weeks; use all leads within that window
        const start = getMonday(NOW);
        start.setDate(start.getDate() - 7 * 51);
        return allLeads.filter(l => l.dateInbound >= start && l.dateInbound <= NOW);
    } else {
        return allLeads.filter(l => l.dateInbound >= yearStart && l.dateInbound <= NOW);
    }
}

// ── Group leads into 52 weekly buckets (most recent first) ──
function getWeeklyBuckets(leads) {
    const buckets = [];
    const thisMonday = getMonday(NOW);
    for (let i = 0; i < 52; i++) {
        const weekStart = new Date(thisMonday);
        weekStart.setDate(weekStart.getDate() - 7 * i);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 6);
        weekEnd.setHours(23, 59, 59, 999);

        const weekLeads = leads.filter(l => l.dateInbound >= weekStart && l.dateInbound <= weekEnd);
        buckets.push({
            start: weekStart,
            end: weekEnd,
            isCurrent: i === 0,
            leads: weekLeads,
        });
    }
    return buckets;
}

// ── Compute traffic source data ──
function getTrafficData(leads) {
    const map = {};
    leads.forEach(l => {
        map[l.source] = (map[l.source] || 0) + 1;
    });
    const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);
    return sorted;
}

// ── Compute status counts ──
function getStatusCounts(leads) {
    let held = 0, noShow = 0, pending = 0;
    leads.forEach(l => {
        if (l.status === 'Held') held++;
        else if (l.status === 'No Show') noShow++;
        else pending++;
    });
    return { held, noShow, pending, total: leads.length };
}

// ── Render ──
function render() {
    const leads = getFilteredLeads();
    const trafficData = getTrafficData(leads);
    const statusCounts = getStatusCounts(leads);
    const dashboard = document.getElementById('dashboard');

    // Update tab ranges
    const monday = getMonday(NOW);
    const monthStart = getMonthStart(NOW);
    const yearStart = getYearStart(NOW);
    const wowStart = new Date(monday);
    wowStart.setDate(wowStart.getDate() - 7 * 51);
    document.getElementById('wtd-range').textContent = formatShort(monday) + ' – ' + formatShort(NOW);
    document.getElementById('mtd-range').textContent = formatShort(monthStart) + ' – ' + formatShort(NOW);
    document.getElementById('ytd-range').textContent = formatShort(yearStart) + ' – ' + formatShort(NOW);
    document.getElementById('wow-range').textContent = formatShort(wowStart) + ' – ' + formatShort(NOW);

    if (currentPeriod === 'wow') {
        dashboard.innerHTML = renderWoW(leads);
        // Destroy any existing charts from previous view
        Object.values(charts).forEach(c => c.destroy());
        charts = {};
        return;
    }

    let html = '';

    // ── Key Metrics ──
    const mdrCount = getMdrSetsForPeriod();
    html += '<div class="section-block">';
    html += '<div class="section-title">Pipeline Summary</div>';
    html += '<div class="stat-grid">';
    html += statCard('Total Inbound', leads.length, '', true);
    html += statCard('Held', statusCounts.held, pct(statusCounts.held, leads.length));
    html += statCard('No Show', statusCounts.noShow, pct(statusCounts.noShow, leads.length));
    html += statCard('Pending', statusCounts.pending, 'Awaiting FTA');
    html += statCard('MDR Sets', mdrCount, 'Running total');
    html += '</div>';
    html += '</div>';

    // ── Weekly Goals (WTD only) ──
    if (currentPeriod === 'wtd') {
        const cats = getCategoryCounts(leads);
        html += renderWeeklyGoals({
            'Total Inbound': [leads.length, weeklyGoals.total],
            'Direct': [cats.direct, weeklyGoals.direct],
            'Organic': [cats.organic, weeklyGoals.organic],
            'Google Ads': [cats.gads, weeklyGoals.gads],
            'MDR Sets': [mdrCount, weeklyGoals.mdr],
        });
    }

    // ── Status breakdown (MTD & YTD only) ──
    if (currentPeriod !== 'wtd') {
        html += '<div class="section-block">';
        html += '<div class="section-title">Status Breakdown</div>';

        // Visual bar
        const total = statusCounts.total || 1;
        html += '<div class="status-bar-visual">';
        html += `<div class="seg" style="width:${(statusCounts.held/total*100)}%;background:var(--success)"></div>`;
        html += `<div class="seg" style="width:${(statusCounts.noShow/total*100)}%;background:var(--destructive)"></div>`;
        html += `<div class="seg" style="width:${(statusCounts.pending/total*100)}%;background:var(--warning)"></div>`;
        html += '</div>';

        html += '<div class="status-grid">';
        html += statusCard(statusCounts.total, 'Total Leads');
        html += statusCard(statusCounts.held, 'Held');
        html += statusCard(statusCounts.noShow, 'No-Showed');
        html += statusCard(statusCounts.pending, 'Pending');
        html += '</div>';
        html += '</div>';
    }

    // ── Traffic Source Hero ──
    html += '<div class="section-block">';
    html += '<div class="traffic-hero" id="traffic-hero">';
    html += '<div class="traffic-hero-title">Traffic Source Breakdown</div>';
    if (trafficData.length === 0) {
        html += '<div style="color:rgba(255,255,255,0.5);font-size:0.85rem;text-align:center;padding:1rem;">No data for this period</div>';
    } else {
        const maxCount = trafficData[0][1];
        html += '<div class="traffic-bars">';
        trafficData.forEach(([source, count], i) => {
            const pctVal = leads.length ? Math.round(count / leads.length * 100) : 0;
            const barWidth = maxCount ? Math.max(count / maxCount * 100, 8) : 0;
            const color = SOURCE_COLORS[i % SOURCE_COLORS.length];
            html += '<div class="traffic-row">';
            html += `<div class="source-name">${escapeHtml(source)}</div>`;
            html += '<div class="bar-track">';
            html += `<div class="bar-fill" style="width:${barWidth}%;background:${color}"><span class="bar-count">${count}</span></div>`;
            html += '</div>';
            html += `<div class="bar-pct">${pctVal}%</div>`;
            html += '</div>';
        });
        html += '</div>';
    }
    html += '</div>';

    // Traffic source table
    if (trafficData.length > 0) {
        html += '<div class="card">';
        html += '<div class="card-header"><div class="card-title">Source Detail</div></div>';
        html += '<div class="card-content"><div style="overflow-x:auto;">';
        html += '<table class="report-table"><thead><tr>';
        html += '<th>Source</th><th style="text-align:right">Leads</th><th style="text-align:right">% of Total</th>';
        html += '<th style="text-align:right">Held</th><th style="text-align:right">No Show</th>';
        html += '</tr></thead><tbody>';
        trafficData.forEach(([source, count]) => {
            const sourceLeads = leads.filter(l => l.source === source);
            const sHeld = sourceLeads.filter(l => l.status === 'Held').length;
            const sNoShow = sourceLeads.filter(l => l.status === 'No Show').length;
            const pctVal = leads.length ? Math.round(count / leads.length * 100) : 0;
            html += '<tr>';
            html += `<td>${escapeHtml(source)}</td>`;
            html += `<td class="num">${count}</td>`;
            html += `<td class="num">${pctVal}%</td>`;
            html += `<td class="num">${sHeld}</td>`;
            html += `<td class="num">${sNoShow}</td>`;
            html += '</tr>';
        });
        html += '</tbody></table></div></div></div>';
    }
    html += '</div>';

    // ── Charts ──
    html += '<div class="section-block">';
    html += '<div class="section-title">Trends</div>';
    html += '<div class="chart-grid">';
    html += '<div class="chart-card"><div class="chart-label">Daily Inbound Volume</div><div class="chart-wrap"><canvas id="chart-daily"></canvas></div></div>';
    html += '<div class="chart-card"><div class="chart-label">Leads by Source</div><div class="chart-wrap"><canvas id="chart-source"></canvas></div></div>';
    html += '</div>';
    html += '</div>';

    // ── Lead Detail ──
    html += '<div class="section-block">';
    html += '<div class="section-title">Lead Detail</div>';

    if (currentPeriod === 'ytd') {
        // Group by month, accordion style
        const monthGroups = {};
        leads.forEach(l => {
            const key = l.dateInbound.getFullYear() + '-' + String(l.dateInbound.getMonth()).padStart(2, '0');
            if (!monthGroups[key]) monthGroups[key] = { label: formatMonthYear(l.dateInbound), leads: [] };
            monthGroups[key].leads.push(l);
        });
        const sortedMonths = Object.keys(monthGroups).sort().reverse();
        sortedMonths.forEach(key => {
            const group = monthGroups[key];
            html += '<div class="month-group">';
            html += `<div class="month-header" onclick="toggleMonth(this)">`;
            html += `<span>${escapeHtml(group.label)}</span>`;
            html += `<span style="display:flex;align-items:center;gap:8px;"><span class="month-count">${group.leads.length} leads</span><span class="chevron">&#9660;</span></span>`;
            html += '</div>';
            html += '<div class="month-body">';
            html += buildLeadTable(group.leads);
            html += '</div></div>';
        });
    } else {
        html += '<div class="card"><div class="card-content" style="padding-top:0;"><div style="overflow-x:auto;">';
        html += buildLeadTable(leads);
        html += '</div></div></div>';
    }

    html += '</div>';

    dashboard.innerHTML = html;

    // Render charts
    renderCharts(leads, trafficData);
}

// ── Week over Week render ──
function renderWoW(leads) {
    const buckets = getWeeklyBuckets(leads);

    let html = '';

    // Summary for whole 52-week window
    const totals = getStatusCounts(leads);
    const mdrTotal = getMdrSetsForPeriod();
    html += '<div class="section-block">';
    html += '<div class="section-title">Trailing 52 Weeks</div>';
    html += '<div class="stat-grid">';
    html += statCard('Total Inbound', leads.length, '', true);
    html += statCard('Held', totals.held, pct(totals.held, leads.length));
    html += statCard('No Show', totals.noShow, pct(totals.noShow, leads.length));
    html += statCard('Pending', totals.pending, 'Awaiting FTA');
    html += statCard('MDR Sets', mdrTotal, 'Running total');
    html += '</div>';
    html += '</div>';

    // Weekly table
    html += '<div class="section-block">';
    html += '<div class="section-title">Week by Week</div>';
    html += '<div class="card"><div class="card-content" style="padding-top:0;"><div style="overflow-x:auto;">';
    html += '<table class="report-table"><thead><tr>';
    const g = weeklyGoals;
    const goalHdr = (val) => val ? `<div style="font-size:0.6rem;font-weight:400;opacity:0.7;text-transform:none;letter-spacing:0;">goal ${val}</div>` : '';
    const goalCell = (actual, goal) => {
        if (!goal) return `<td class="num">${actual}</td>`;
        const met = actual >= goal;
        const color = met ? 'var(--success)' : 'var(--text-muted)';
        const weight = met ? '700' : '400';
        return `<td class="num" style="color:${color};font-weight:${weight}">${actual}</td>`;
    };

    html += '<th>Week</th>';
    html += `<th style="text-align:right">Total${goalHdr(g.total)}</th>`;
    html += `<th style="text-align:right">Direct${goalHdr(g.direct)}</th>`;
    html += `<th style="text-align:right">Organic${goalHdr(g.organic)}</th>`;
    html += `<th style="text-align:right">Google Ads${goalHdr(g.gads)}</th>`;
    html += `<th style="text-align:right">MDR Sets${goalHdr(g.mdr)}</th>`;
    html += '<th style="text-align:right">Held</th>';
    html += '<th style="text-align:right">No Show</th>';
    html += '<th style="text-align:right">Held %</th>';
    html += '</tr></thead><tbody>';

    buckets.forEach(b => {
        const counts = getStatusCounts(b.leads);
        const cats = getCategoryCounts(b.leads);
        const weekLabel = formatShort(b.start) + ' – ' + formatShort(b.end);
        const currentBadge = b.isCurrent ? ' <span style="display:inline-block;padding:1px 6px;font-size:0.65rem;background:var(--primary);color:var(--dark);border-radius:3px;margin-left:4px;font-weight:700;">CURRENT</span>' : '';
        const heldPct = counts.total ? Math.round(counts.held / counts.total * 100) + '%' : '—';
        const mdrWeek = countMdrSetsInRange(b.start, b.end);

        html += '<tr>';
        html += `<td style="white-space:nowrap"><strong>${weekLabel}</strong>${currentBadge}</td>`;
        html += goalCell(counts.total, g.total);
        html += goalCell(cats.direct, g.direct);
        html += goalCell(cats.organic, g.organic);
        html += goalCell(cats.gads, g.gads);
        html += goalCell(mdrWeek, g.mdr);
        html += `<td class="num" style="color:var(--success)">${counts.held}</td>`;
        html += `<td class="num" style="color:var(--destructive)">${counts.noShow}</td>`;
        html += `<td class="num">${heldPct}</td>`;
        html += '</tr>';
    });

    html += '</tbody></table></div></div></div>';
    html += '</div>';

    return html;
}

function renderWeeklyGoals(items) {
    let html = '<div class="section-block">';
    html += '<div class="section-title">Weekly Goals</div>';
    html += '<div class="goal-grid">';
    Object.entries(items).forEach(([label, [actual, goal]]) => {
        if (!goal) {
            html += `<div class="goal-card">
                <div class="goal-label">${label}</div>
                <div class="goal-value">${actual}</div>
                <div class="goal-pct">No goal set</div>
            </div>`;
            return;
        }
        const pctVal = Math.round(actual / goal * 100);
        const barWidth = Math.min(pctVal, 100);
        const met = actual >= goal;
        html += `<div class="goal-card${met ? ' met' : ''}">
            <div class="goal-label">${label}</div>
            <div class="goal-value">${actual} <span class="goal-target">/ ${goal}</span></div>
            <div class="goal-bar"><div class="goal-bar-fill" style="width:${barWidth}%"></div></div>
            <div class="goal-pct">${pctVal}%${met ? ' — goal met' : ''}</div>
        </div>`;
    });
    html += '</div></div>';
    return html;
}

function statCard(label, value, sub, highlight) {
    return `<div class="stat-card${highlight ? ' highlight-card' : ''}">
        <div class="stat-label">${label}</div>
        <div class="stat-value">${value}</div>
        ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
    </div>`;
}

function statusCard(count, label) {
    return `<div class="status-card">
        <div class="status-count">${count}</div>
        <div class="status-label">${label}</div>
    </div>`;
}

function pct(n, total) {
    if (!total) return '0%';
    return Math.round(n / total * 100) + '% of total';
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function buildLeadTable(leads) {
    if (leads.length === 0) return '<div class="empty-state">No leads for this period</div>';
    let html = '<table class="report-table"><thead><tr>';
    html += '<th>Company</th><th>Practice Area</th><th>AE</th><th>Date</th><th>FTA Show</th><th>Source</th><th>City/State</th>';
    html += '</tr></thead><tbody>';
    leads.forEach(l => {
        const statusColor = l.status === 'Held' ? 'var(--success)' : l.status === 'No Show' ? 'var(--destructive)' : 'var(--warning)';
        html += '<tr>';
        html += `<td><strong>${escapeHtml(l.name)}</strong></td>`;
        html += `<td>${escapeHtml(l.practice)}</td>`;
        html += `<td>${escapeHtml(l.ae)}</td>`;
        html += `<td style="white-space:nowrap">${formatShort(l.dateInbound)}</td>`;
        html += `<td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${statusColor};margin-right:6px;"></span>${escapeHtml(l.status)}</td>`;
        html += `<td>${escapeHtml(l.source)}</td>`;
        html += `<td>${escapeHtml(l.city)}</td>`;
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

// ── Charts ──
function renderCharts(leads, trafficData) {
    // Destroy existing charts
    Object.values(charts).forEach(c => c.destroy());
    charts = {};

    // Daily volume
    const dailyMap = {};
    leads.forEach(l => {
        const key = formatShort(l.dateInbound);
        dailyMap[key] = (dailyMap[key] || 0) + 1;
    });
    const dailyLabels = Object.keys(dailyMap);
    const dailyValues = Object.values(dailyMap);

    const dailyCtx = document.getElementById('chart-daily');
    if (dailyCtx) {
        charts.daily = new Chart(dailyCtx, {
            type: 'bar',
            data: {
                labels: dailyLabels.reverse(),
                datasets: [{
                    data: dailyValues.reverse(),
                    backgroundColor: 'rgba(234,255,106,0.85)',
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: 'rgba(255,255,255,0.6)', font: { family: 'IBM Plex Mono', size: 10 } }, grid: { display: false } },
                    y: { beginAtZero: true, ticks: { color: 'rgba(255,255,255,0.6)', font: { family: 'IBM Plex Mono', size: 10 }, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.06)' } },
                }
            }
        });
    }

    // Source doughnut
    const sourceCtx = document.getElementById('chart-source');
    if (sourceCtx && trafficData.length > 0) {
        charts.source = new Chart(sourceCtx, {
            type: 'doughnut',
            data: {
                labels: trafficData.map(t => t[0]),
                datasets: [{
                    data: trafficData.map(t => t[1]),
                    backgroundColor: trafficData.map((_, i) => SOURCE_COLORS[i % SOURCE_COLORS.length]),
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '55%',
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { color: 'rgba(255,255,255,0.8)', font: { family: 'IBM Plex Mono', size: 11 }, padding: 12 }
                    }
                }
            }
        });
    }
}

// ── Toggle month accordion ──
function toggleMonth(el) {
    el.classList.toggle('open');
    const body = el.nextElementSibling;
    body.classList.toggle('open');
}

// ── Download snapshot ──
async function downloadSnapshot() {
    const btn = document.getElementById('btn-snapshot');
    btn.disabled = true;
    btn.textContent = 'Capturing...';

    try {
        const area = document.getElementById('snapshot-area');
        const canvas = await html2canvas(area, {
            backgroundColor: '#f4f0e6',
            scale: 2,
            useCORS: true,
            logging: false,
        });

        const link = document.createElement('a');
        const periodLabel = currentPeriod === 'wtd' ? 'Week' : currentPeriod === 'mtd' ? 'Month' : currentPeriod === 'wow' ? 'WoW' : 'Year';
        link.download = `Inbound-Leads-${periodLabel}-${formatShort(NOW).replace('/', '-')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    } catch (err) {
        console.error('Snapshot error:', err);
        alert('Failed to capture snapshot. Try again.');
    }

    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Snapshot';
}

// ── Tab switching ──
document.querySelectorAll('.period-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentPeriod = tab.dataset.period;
        render();
    });
});

// ── Init ──
async function init() {
    try {
        await fetchData();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = '';
        render();
    } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('loading').innerHTML = '<div style="color:var(--destructive);">Failed to load data. Please refresh.</div>';
    }
}

init();
</script>
</body>
</html>
