<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Saturation Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  :root {
    --midnight: #0B0B2A;
    --tuxedo: #1C1C3A;
    --chartreuse: #D6FF3D;
    --sky: #6BCEE8;
    --flax: #F5D67E;
    --pearl: #F5F5F0;
    --pearl-dim: #E8E8E0;
    --ink: #0B0B2A;
    --muted: #6B6B7A;
    --pi-mva: #FF6B6B;
    --pi-other: #FFA94D;
    --non-pi: #74C0FC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Mono', ui-monospace, monospace;
    background: var(--pearl);
    color: var(--ink);
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: 100vh;
    background: var(--pearl);
  }

  /* Map panel */
  .map-panel {
    position: relative;
    background:
      radial-gradient(circle at 20% 20%, rgba(214,255,61,0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(107,206,232,0.04) 0%, transparent 40%),
      var(--pearl);
    overflow: hidden;
  }
  .map-header {
    position: absolute;
    top: 24px;
    left: 32px;
    z-index: 5;
    pointer-events: none;
  }
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.1;
    margin-top: 6px;
  }
  .accent { color: var(--pi-mva); }
  .map-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Practice area filter */
  .pa-filter {
    position: absolute;
    top: 24px;
    right: 32px;
    z-index: 5;
    display: flex;
    gap: 8px;
  }
  .pa-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1.5px solid;
    background: #fff;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0.5;
  }
  .pa-btn.active { opacity: 1; font-weight: 500; }
  .pa-btn[data-pa="all"] { border-color: var(--ink); color: var(--ink); }
  .pa-btn[data-pa="all"].active { background: var(--ink); color: #fff; }
  .pa-btn[data-pa="pi-mva"] { border-color: var(--pi-mva); color: var(--pi-mva); }
  .pa-btn[data-pa="pi-mva"].active { background: var(--pi-mva); color: #fff; }
  .pa-btn[data-pa="pi-other"] { border-color: var(--pi-other); color: var(--pi-other); }
  .pa-btn[data-pa="pi-other"].active { background: var(--pi-other); color: #fff; }
  .pa-btn[data-pa="non-pi"] { border-color: var(--non-pi); color: var(--non-pi); }
  .pa-btn[data-pa="non-pi"].active { background: var(--non-pi); color: #fff; }

  .usmap { width: 100%; height: 100%; }
  .state { fill: var(--pearl-dim); stroke: none; }
  .state.has-clients { fill: #E2E2D8; }
  .city-bubble { cursor: pointer; transition: opacity 0.2s; }
  .city-bubble.selected { stroke-width: 3; filter: drop-shadow(0 0 6px rgba(0,0,0,0.3)); }
  .city-bubble.dimmed { opacity: 0.15; }

  .legend {
    position: absolute;
    bottom: 24px;
    left: 32px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .legend-title {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; }
  .legend-dot { border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 11px; color: var(--ink); }
  .legend-count { font-size: 10px; color: var(--muted); margin-left: auto; min-width: 30px; text-align: right; }

  /* Practice area legend */
  .pa-legend {
    position: absolute;
    bottom: 24px;
    right: 32px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .pa-legend-row { display: flex; align-items: center; gap: 6px; }
  .pa-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pa-legend-label { font-size: 10px; color: var(--muted); }

  /* Sidebar */
  .sidebar {
    background: var(--midnight);
    border-left: 1px solid var(--tuxedo);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--tuxedo);
  }
  .sidebar-eyebrow {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--chartreuse);
    margin-bottom: 8px;
  }
  .sidebar-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--pearl);
    line-height: 1.1;
  }
  .sidebar-stats {
    display: flex;
    gap: 18px;
    margin-top: 16px;
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--pearl);
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
    margin-top: 4px;
  }

  /* Toggle */
  .view-toggle {
    display: flex;
    margin: 18px 28px 0;
    border: 1px solid var(--tuxedo);
    background: var(--tuxedo);
    padding: 3px;
  }
  .view-toggle button {
    flex: 1;
    background: transparent;
    border: none;
    color: rgba(245,245,240,0.6);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--chartreuse);
    color: var(--midnight);
    font-weight: 500;
  }

  /* Scope toggle (City / Metro) */
  .scope-toggle {
    display: inline-flex;
    margin: 14px 0 0;
    border: 1.5px solid var(--ink);
    pointer-events: auto; /* map-header is pointer-events:none; re-enable here */
  }
  .scope-toggle button {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: none;
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
  }
  .scope-toggle button + button { border-left: 1.5px solid var(--ink); }
  .scope-toggle button.active { background: var(--ink); color: #fff; font-weight: 500; }

  .filter-banner {
    margin: 14px 0 4px;
    padding: 9px 12px;
    background: rgba(214,255,61,0.12);
    border: 1px solid var(--chartreuse);
    font-size: 11px;
    color: rgba(245,245,240,0.85);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .filter-banner b { color: var(--chartreuse); font-weight: 600; }
  .clear-filter {
    color: var(--chartreuse);
    cursor: pointer;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .clear-filter:hover { text-decoration: underline; }

  /* Detail panel */
  .detail {
    padding: 24px 28px;
    flex: 1;
    overflow-y: auto;
  }
  .detail.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .empty-msg {
    color: rgba(245,245,240,0.4);
    font-size: 12px;
    line-height: 1.6;
    max-width: 220px;
  }
  .detail-city {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    color: var(--pearl);
    margin-bottom: 4px;
  }
  .detail-state {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(245,245,240,0.5);
    text-transform: uppercase;
  }
  .detail-meta {
    display: flex;
    gap: 16px;
    margin-top: 18px;
    padding: 14px 0;
    border-top: 1px solid var(--tuxedo);
    border-bottom: 1px solid var(--tuxedo);
  }
  .meta-item { flex: 1; }
  .meta-num {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--pearl);
    line-height: 1;
  }
  .meta-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
    margin-top: 4px;
  }
  .saturation-pill {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    border: 1px solid currentColor;
  }

  /* Practice area bar */
  .pa-bar-wrap {
    margin-top: 16px;
  }
  .pa-bar-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
    margin-bottom: 6px;
  }
  .pa-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--tuxedo);
  }
  .pa-bar-seg { height: 100%; transition: width 0.3s; }
  .pa-bar-legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .pa-bar-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: rgba(245,245,240,0.7);
  }
  .pa-bar-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* MRR display */
  .mrr-display {
    margin-top: 14px;
    padding: 10px 0;
    border-top: 1px solid var(--tuxedo);
  }
  .mrr-num {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--chartreuse);
    line-height: 1;
  }
  .mrr-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
    margin-top: 4px;
  }

  .clients-header {
    margin-top: 20px;
    margin-bottom: 12px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
  }
  .client-list { list-style: none; }
  .client-list li {
    padding: 10px 0;
    border-bottom: 1px solid rgba(245,245,240,0.08);
    font-size: 12px;
    color: var(--pearl);
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .client-list li:last-child { border-bottom: none; }
  .client-name-mva {
    border-bottom: 2px solid var(--pi-mva);
    padding-bottom: 1px;
  }
  .client-name-other {
    border-bottom: 2px solid var(--pi-other);
    padding-bottom: 1px;
  }
  .client-name-nonpi {
    border-bottom: 2px solid var(--non-pi);
    padding-bottom: 1px;
  }
  .small-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 2px 5px;
    border-radius: 3px;
    background: rgba(245,214,126,0.15);
    color: var(--flax);
    border: 1px solid rgba(245,214,126,0.3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Top cities list */
  .top-list {
    padding: 0 28px 24px;
    flex: 1;
    overflow-y: auto;
  }
  .top-list::-webkit-scrollbar { width: 6px; }
  .top-list::-webkit-scrollbar-thumb { background: var(--tuxedo); }

  .top-row {
    display: grid;
    grid-template-columns: 28px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--tuxedo);
    cursor: pointer;
    transition: background 0.15s;
    margin: 0 -8px;
    padding-left: 8px;
    padding-right: 8px;
  }
  .top-row:hover { background: var(--tuxedo); }
  .top-rank {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(245,245,240,0.4);
  }
  .top-city {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--pearl);
  }
  .top-state {
    font-size: 10px;
    color: rgba(245,245,240,0.5);
    margin-left: 4px;
  }
  .top-pa {
    display: flex;
    gap: 3px;
  }
  .top-pa-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .top-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--chartreuse);
    font-weight: 500;
    min-width: 20px;
    text-align: right;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--midnight);
    color: var(--pearl);
    padding: 8px 12px;
    font-size: 11px;
    border: 1px solid var(--chartreuse);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-city {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 600;
  }
  .tooltip-meta {
    color: rgba(245,245,240,0.6);
    font-size: 10px;
    margin-top: 2px;
  }

  /* Loading */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--pearl);
    z-index: 20;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .loading.hidden { display: none; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 60vh 40vh; }
    .sidebar { border-left: none; border-top: 1px solid var(--tuxedo); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="map-panel">
    <div class="loading" id="loading">Loading map data...</div>
    <div class="map-header">
      <div class="eyebrow">Rankings.io -- Client Distribution</div>
      <h1>Saturation by <span class="accent" id="scopeAccent">HQ City</span></h1>
      <div class="map-meta" id="metaLine">Loading...</div>
      <div class="scope-toggle">
        <button class="active" data-scope="city">By City</button>
        <button data-scope="dma">By Metro (DMA)</button>
      </div>
    </div>
    <div class="pa-filter">
      <button class="pa-btn active" data-pa="all">All</button>
      <button class="pa-btn" data-pa="pi-mva">PI-MVA</button>
      <button class="pa-btn" data-pa="pi-other">PI-Other</button>
      <button class="pa-btn" data-pa="non-pi">Non-PI</button>
    </div>
    <svg class="usmap" id="usmap"></svg>
    <div class="legend">
      <div class="legend-title">Saturation</div>
      <div class="legend-row">
        <div class="legend-dot" style="width:18px;height:18px;background:#FFB3B3"></div>
        <div class="legend-label">Very High</div><div class="legend-count">5+</div>
      </div>
      <div class="legend-row">
        <div class="legend-dot" style="width:14px;height:14px;background:#FFD9B3"></div>
        <div class="legend-label">High</div><div class="legend-count">3-4</div>
      </div>
      <div class="legend-row">
        <div class="legend-dot" style="width:11px;height:11px;background:#FFF4CC"></div>
        <div class="legend-label">Moderate</div><div class="legend-count">2</div>
      </div>
      <div class="legend-row">
        <div class="legend-dot" style="width:8px;height:8px;background:#D6E4F5"></div>
        <div class="legend-label">Low</div><div class="legend-count">1</div>
      </div>
    </div>
    <div class="pa-legend">
      <div class="legend-title">Practice Area</div>
      <div class="pa-legend-row"><div class="pa-legend-dot" style="background:var(--pi-mva)"></div><div class="pa-legend-label">PI-MVA</div></div>
      <div class="pa-legend-row"><div class="pa-legend-dot" style="background:var(--pi-other)"></div><div class="pa-legend-label">PI-Other</div></div>
      <div class="pa-legend-row"><div class="pa-legend-dot" style="background:var(--non-pi)"></div><div class="pa-legend-label">Non-PI</div></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-eyebrow">Client Map</div>
      <div class="sidebar-title">Geographic Saturation</div>
      <div class="sidebar-stats">
        <div class="stat"><div class="stat-num" id="statClients">--</div><div class="stat-label">Clients</div></div>
        <div class="stat"><div class="stat-num" id="statCities">--</div><div class="stat-label" id="statCitiesLabel">HQ Cities</div></div>
        <div class="stat"><div class="stat-num" id="statStates">--</div><div class="stat-label">States</div></div>
      </div>
    </div>

    <div class="view-toggle">
      <button class="active" data-view="top" id="topViewBtn">Top Cities</button>
      <button data-view="detail">Selected</button>
    </div>

    <div id="topList" class="top-list"></div>
    <div id="detail" class="detail empty" style="display:none">
      <div class="empty-msg">Click any city dot on the map<br>to see client details.</div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

// Load a gviz JSONP sheet
function loadSheet(url, callbackName) {
  return new Promise((resolve, reject) => {
    window[callbackName] = function(response) {
      try { resolve(response.table); }
      catch(e) { reject(e); }
    };
    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => reject(new Error('Failed to load sheet data.'));
    document.head.appendChild(script);
  });
}

// Fetch both sheets and merge
async function fetchSheetData() {
  const [cityTable, clientTable] = await Promise.all([
    loadSheet(GVIZ_URL, 'handleSheetData'),
    loadSheet(CLIENTS_URL, 'handleClientData'),
  ]);

  // Parse master client list (gid=284342695)
  // Cols: 0=URL, 1=Alt URL, 2=Company Name, 3=Owner, 4=Practice Area,
  //        5=Total MRR, 6=City, 7=State, 8=Metro/DMA, 9=PI Classification,
  //        10=Status (Active/Churned — set by the HubSpot sync)
  const firmsByCity = {}; // key "City, ST" -> [firm]
  const firmsByDMA = {};  // key DMA/metro name -> [firm]
  clientTable.rows.forEach(row => {
    const cell = (idx) => {
      const c = row.c && row.c[idx];
      return c && c.v != null ? c.v : '';
    };
    const name = String(cell(2)).trim();
    const city = String(cell(6)).trim();
    const state = String(cell(7)).trim();
    const dma = String(cell(8)).trim(); // Metro/DMA
    const status = String(cell(10)).trim().toLowerCase();
    const classification = String(cell(9)).trim(); // PI-MVA, PI-Other, Non-PI
    const practiceArea = String(cell(4)).trim();
    const mrrRaw = cell(5);
    const mrr = typeof mrrRaw === 'number' ? mrrRaw : parseFloat(String(mrrRaw).replace(/[$,]/g, '')) || 0;
    if (status === 'churned') return; // skip churned clients (row kept for history)
    if (!name || !city) return;
    const key = `${city}, ${state}`;
    const geo = GEO[key];
    const firm = { name, classification, practiceArea, mrr, city, state, dma,
                   lat: geo ? geo[0] : null, lng: geo ? geo[1] : null };
    (firmsByCity[key] = firmsByCity[key] || []).push(firm);
    if (dma) (firmsByDMA[dma] = firmsByDMA[dma] || []).push(firm);
  });

  // Parse city saturation tab
  // Cols: 0=City, 1=State, 2=Total Clients, 3=PI-MVA Count,
  //        4=PI-Other Count, 5=Non-PI Count, 6=Saturation Level, 7=PI-MVA MRR,
  //        8=PI-MVA Competitors, 9=Under 10k
  const cities = cityTable.rows.map(row => {
    const cell = (idx) => {
      const c = row.c && row.c[idx];
      return c && c.v != null ? c.v : '';
    };

    const city = String(cell(0));
    const state = String(cell(1));
    if (!city) return null;
    const key = `${city}, ${state}`;
    const geo = GEO[key];
    const satLevel = parseInt(cell(6)) || 1;
    const under10kRaw = String(cell(9) || '');
    const under10kList = under10kRaw ? under10kRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
    const under10kSet = new Set(under10kList.map(s => s.toLowerCase()));
    const mrrVal = cell(7);
    const mrr = mrrVal ? '$' + Number(mrrVal).toLocaleString() : '';

    // Get all firms from master list for this city
    const allFirms = firmsByCity[key] || [];

    return {
      city, state, key,
      lat: geo ? geo[0] : null,
      lng: geo ? geo[1] : null,
      count: parseInt(cell(2)) || 0,
      piMva: parseInt(cell(3)) || 0,
      piOther: parseInt(cell(4)) || 0,
      nonPi: parseInt(cell(5)) || 0,
      saturation: SAT_LEVELS[satLevel] || 'Low',
      firms: allFirms,
      under10k: under10kSet,
      mrr: mrr,
    };
  }).filter(c => c && c.lat !== null && c.count > 0);

  // Build the DMA (metro) dataset from the same active firms, positioning each
  // metro bubble at the geographic centroid of its member cities.
  const dmaLevel = (n) => (n >= 7 ? 4 : n >= 4 ? 3 : n >= 2 ? 2 : 1);
  const dmas = Object.keys(firmsByDMA).map(dma => {
    const firms = firmsByDMA[dma];
    const located = firms.filter(f => f.lat != null);
    if (!located.length) return null; // can't place a bubble with no known cities
    const lat = located.reduce((s, f) => s + f.lat, 0) / located.length;
    const lng = located.reduce((s, f) => s + f.lng, 0) / located.length;
    const byClass = (cl) => firms.filter(f => f.classification === cl).length;
    const count = firms.length;
    const mvaMrr = firms.filter(f => f.classification === 'PI-MVA').reduce((s, f) => s + f.mrr, 0);
    return {
      city: dma, state: 'Metro / DMA', key: dma,
      lat, lng, count,
      piMva: byClass('PI-MVA'), piOther: byClass('PI-Other'), nonPi: byClass('Non-PI'),
      saturation: SAT_LEVELS[dmaLevel(count)] || 'Low',
      firms,
      under10k: new Set(firms.filter(f => f.mrr > 0 && f.mrr < 10000).map(f => f.name.toLowerCase())),
      mrr: mvaMrr ? '$' + Number(mvaMrr).toLocaleString() : '',
    };
  }).filter(Boolean);

  return { cities, dmas };
}

// Tooltip URL
const topoUrl = 'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json';

async function init() {
  const [data, us] = await Promise.all([
    fetchSheetData(),
    fetch(topoUrl).then(r => r.json())
  ]);

  const DATASETS = { city: data.cities, dma: data.dmas };
  let scope = 'city';

  // ---- Base map (drawn once) ----
  const statesGeo = topojson.feature(us, us.objects.states);
  const stateMesh = topojson.mesh(us, us.objects.states, (a,b) => a !== b);

  const svg = d3.select('#usmap');
  const node = svg.node();
  const box0 = node.getBoundingClientRect();
  const projection = d3.geoAlbersUsa().fitSize([box0.width, box0.height], statesGeo);
  const path = d3.geoPath(projection);

  const stateAbbrToName = {
    'AL':'Alabama','AK':'Alaska','AZ':'Arizona','AR':'Arkansas','CA':'California',
    'CO':'Colorado','CT':'Connecticut','DE':'Delaware','FL':'Florida','GA':'Georgia',
    'HI':'Hawaii','ID':'Idaho','IL':'Illinois','IN':'Indiana','IA':'Iowa','KS':'Kansas',
    'KY':'Kentucky','LA':'Louisiana','ME':'Maine','MD':'Maryland','MA':'Massachusetts',
    'MI':'Michigan','MN':'Minnesota','MS':'Mississippi','MO':'Missouri','MT':'Montana',
    'NE':'Nebraska','NV':'Nevada','NH':'New Hampshire','NJ':'New Jersey','NM':'New Mexico',
    'NY':'New York','NC':'North Carolina','ND':'North Dakota','OH':'Ohio','OK':'Oklahoma',
    'OR':'Oregon','PA':'Pennsylvania','RI':'Rhode Island','SC':'South Carolina',
    'SD':'South Dakota','TN':'Tennessee','TX':'Texas','UT':'Utah','VT':'Vermont',
    'VA':'Virginia','WA':'Washington','WV':'West Virginia','WI':'Wisconsin','WY':'Wyoming',
    'DC':'District of Columbia'
  };

  const statesLayer = svg.append('g');
  statesLayer.selectAll('path')
    .data(statesGeo.features)
    .join('path')
    .attr('class', 'state')
    .attr('d', path);
  const meshPath = svg.append('path')
    .attr('d', path(stateMesh))
    .attr('fill', 'none')
    .attr('stroke', '#C8C8C0')
    .attr('stroke-width', 0.6)
    .attr('stroke-linejoin', 'round');

  const bubbleLayer = svg.append('g');
  const tooltip = d3.select('#tooltip');
  const topList = d3.select('#topList');

  let activePA = 'all';
  let selected = null;
  let current = [];     // active dataset
  let currentTop = [];  // active dataset sorted desc by count

  // ---- Render (re-run whenever scope changes) ----
  function render() {
    current = DATASETS[scope];

    // States that have clients in this scope
    const stateSet = new Set();
    current.forEach(d => (d.firms || []).forEach(f => f.state && stateSet.add(f.state)));
    const statesWithClients = new Set([...stateSet].map(s => stateAbbrToName[s]));
    statesLayer.selectAll('path')
      .attr('class', d => 'state' + (statesWithClients.has(d.properties.name) ? ' has-clients' : ''));

    // Stats + chrome
    const totalClients = current.reduce((s, c) => s + c.count, 0);
    const unit = scope === 'city' ? 'cities' : 'metros';
    document.getElementById('metaLine').textContent =
      `${totalClients} clients -- ${current.length} ${unit} -- ${stateSet.size} states`;
    refreshStatClients();
    document.getElementById('statCities').textContent = current.length;
    document.getElementById('statStates').textContent = stateSet.size;
    document.getElementById('statCitiesLabel').textContent = scope === 'city' ? 'HQ Cities' : 'Metros';
    document.getElementById('scopeAccent').textContent = scope === 'city' ? 'HQ City' : 'Metro (DMA)';
    document.getElementById('topViewBtn').textContent = scope === 'city' ? 'Top Cities' : 'Top Metros';
    updateLegend();

    // Bubbles
    const maxCount = d3.max(current, c => c.count) || 1;
    const rScale = d3.scaleSqrt().domain([1, maxCount]).range([3.5, 18]);
    const points = current.map(c => {
      const p = projection([c.lng, c.lat]);
      return p ? Object.assign({}, c, { x: p[0], y: p[1] }) : null;
    }).filter(Boolean);
    const drawn = [...points].sort((a, b) => a.count - b.count);

    const sel = bubbleLayer.selectAll('circle').data(drawn, d => d.key);
    sel.exit().remove();
    sel.enter().append('circle')
      .attr('class', 'city-bubble')
      .on('mouseenter', (event, d) => {
        const paParts = [];
        if (d.piMva) paParts.push(d.piMva + ' PI-MVA');
        if (d.piOther) paParts.push(d.piOther + ' PI-Other');
        if (d.nonPi) paParts.push(d.nonPi + ' Non-PI');
        tooltip.classed('visible', true)
          .html(`<div class="tooltip-city">${d.key}</div>
                 <div class="tooltip-meta">${d.count} client${d.count===1?'':'s'} -- ${d.saturation}</div>
                 <div class="tooltip-meta">${paParts.join(' / ')}</div>`);
      })
      .on('mousemove', (event) => {
        tooltip.style('left', (event.pageX + 14) + 'px').style('top', (event.pageY + 14) + 'px');
      })
      .on('mouseleave', () => tooltip.classed('visible', false))
      .on('click', (event, d) => selectItem(d))
      .merge(sel)
      .attr('cx', d => d.x)
      .attr('cy', d => d.y)
      .attr('r', d => rScale(d.count))
      .attr('fill', d => SAT_COLOR[d.saturation])
      .attr('stroke', d => SAT_BORDER[d.saturation])
      .attr('stroke-width', 1.5)
      .attr('fill-opacity', 0.85);

    applyPA();

    currentTop = [...current].sort((a, b) => b.count - a.count);
    renderTopList();
    bubbleLayer.selectAll('.city-bubble').classed('selected', false);
  }

  function updateLegend() {
    const tiers = scope === 'city' ? ['5+', '3-4', '2', '1'] : ['7+', '4-6', '2-3', '1'];
    document.querySelectorAll('.legend .legend-count').forEach((el, i) => {
      if (tiers[i] != null) el.textContent = tiers[i];
    });
  }

  function applyPA() {
    bubbleLayer.selectAll('.city-bubble').classed('dimmed', d => {
      if (activePA === 'all') return false;
      if (activePA === 'pi-mva') return d.piMva === 0;
      if (activePA === 'pi-other') return d.piOther === 0;
      if (activePA === 'non-pi') return d.nonPi === 0;
      return false;
    });
  }

  // Count for the active practice-area filter (total when 'all').
  function paVal(d) {
    if (activePA === 'pi-mva') return d.piMva;
    if (activePA === 'pi-other') return d.piOther;
    if (activePA === 'non-pi') return d.nonPi;
    return d.count;
  }

  function refreshStatClients() {
    document.getElementById('statClients').textContent =
      current.reduce((s, c) => s + paVal(c), 0);
  }

  function renderTopList() {
    let list = currentTop;
    if (activePA !== 'all') {
      list = currentTop.filter(d => paVal(d) > 0).sort((a, b) => paVal(b) - paVal(a));
    }
    topList.selectAll('div.top-row').remove();
    topList.selectAll('div.top-row')
      .data(list)
      .join('div')
      .attr('class', 'top-row')
      .html((d, i) => `
        <div class="top-rank">${String(i+1).padStart(2,'0')}</div>
        <div><span class="top-city">${d.city}</span>${d.state && d.state !== 'Metro / DMA' ? `<span class="top-state">, ${d.state}</span>` : ''}</div>
        <div class="top-pa">
          ${d.piMva ? `<div class="top-pa-dot" style="background:var(--pi-mva)" title="${d.piMva} PI-MVA"></div>` : ''}
          ${d.piOther ? `<div class="top-pa-dot" style="background:var(--pi-other)" title="${d.piOther} PI-Other"></div>` : ''}
          ${d.nonPi ? `<div class="top-pa-dot" style="background:var(--non-pi)" title="${d.nonPi} Non-PI"></div>` : ''}
        </div>
        <div class="top-count">${paVal(d)}</div>
      `)
      .on('click', (event, d) => selectItem(d));
  }

  function selectItem(d) {
    selected = d;
    bubbleLayer.selectAll('.city-bubble').classed('selected', x => x.key === d.key);
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === 'detail'));
    showView('detail');

    const det = document.getElementById('detail');
    det.classList.remove('empty');
    const satColor = SAT_COLOR[d.saturation];
    const total = d.piMva + d.piOther + d.nonPi;
    const mvaW = total ? (d.piMva / total * 100) : 0;
    const otherW = total ? (d.piOther / total * 100) : 0;
    const nonW = total ? (d.nonPi / total * 100) : 0;

    const classMap = { 'PI-MVA': 'mva', 'PI-Other': 'other', 'Non-PI': 'nonpi' };
    const sortOrder = { 'PI-MVA': 0, 'PI-Other': 1, 'Non-PI': 2 };
    const sorted = [...d.firms].sort((a, b) => (sortOrder[a.classification] || 9) - (sortOrder[b.classification] || 9));
    const paClass = { 'pi-mva': 'PI-MVA', 'pi-other': 'PI-Other', 'non-pi': 'Non-PI' }[activePA];
    const shownFirms = paClass ? sorted.filter(f => f.classification === paClass) : sorted;
    const clientListHtml = shownFirms.length
      ? shownFirms.map(f => {
          const cls = classMap[f.classification] || 'nonpi';
          const isSmall = f.mrr > 0 && f.mrr < 10000;
          const mrrStr = f.mrr ? '$' + f.mrr.toLocaleString() : '';
          const loc = (scope === 'dma' && f.city) ? `<span style="font-size:10px;color:rgba(245,245,240,0.35);margin-left:6px">${f.city}, ${f.state}</span>` : '';
          return `<li>
            <span class="client-name-${cls}">${f.name}</span>${loc}
            ${isSmall ? '<span class="small-badge">&lt;10K</span>' : ''}
            ${mrrStr ? `<span style="margin-left:auto;font-size:10px;color:rgba(245,245,240,0.4)">${mrrStr}</span>` : ''}
          </li>`;
        }).join('')
      : '<li style="color:rgba(245,245,240,0.4)">No client data available</li>';

    const rank = currentTop.findIndex(c => c.key === d.key) + 1;
    det.innerHTML = `
      <div class="detail-city">${d.city}</div>
      <div class="detail-state">${d.state}</div>
      <span class="saturation-pill" style="color:${satColor};border-color:${satColor};background:${satColor}22">${d.saturation}</span>
      ${paClass ? `<div class="filter-banner">Showing <b>${paClass}</b> only<span class="clear-filter" id="clearFilter">✕ clear filter</span></div>` : ''}
      <div class="detail-meta">
        <div class="meta-item"><div class="meta-num">${d.count}</div><div class="meta-label">Clients</div></div>
        <div class="meta-item"><div class="meta-num">#${rank}</div><div class="meta-label">Rank</div></div>
      </div>
      ${d.mrr ? `<div class="mrr-display"><div class="mrr-num">${d.mrr}</div><div class="mrr-label">PI-MVA MRR</div></div>` : ''}
      <div class="pa-bar-wrap">
        <div class="pa-bar-label">Practice Area Breakdown</div>
        <div class="pa-bar">
          ${mvaW ? `<div class="pa-bar-seg" style="width:${mvaW}%;background:var(--pi-mva)"></div>` : ''}
          ${otherW ? `<div class="pa-bar-seg" style="width:${otherW}%;background:var(--pi-other)"></div>` : ''}
          ${nonW ? `<div class="pa-bar-seg" style="width:${nonW}%;background:var(--non-pi)"></div>` : ''}
        </div>
        <div class="pa-bar-legend">
          ${d.piMva ? `<div class="pa-bar-item"><div class="pa-bar-dot" style="background:var(--pi-mva)"></div>${d.piMva} MVA</div>` : ''}
          ${d.piOther ? `<div class="pa-bar-item"><div class="pa-bar-dot" style="background:var(--pi-other)"></div>${d.piOther} Other</div>` : ''}
          ${d.nonPi ? `<div class="pa-bar-item"><div class="pa-bar-dot" style="background:var(--non-pi)"></div>${d.nonPi} Non-PI</div>` : ''}
        </div>
      </div>
      <div class="clients-header">${paClass ? `${paClass} Clients (${shownFirms.length})` : `All Clients (${d.count})`}</div>
      <ul class="client-list">${clientListHtml}</ul>
    `;

    const cf = document.getElementById('clearFilter');
    if (cf) cf.addEventListener('click', () => {
      activePA = 'all';
      document.querySelectorAll('.pa-btn').forEach(b => b.classList.toggle('active', b.dataset.pa === 'all'));
      applyPA();
      refreshStatClients();
      renderTopList();
      selectItem(d);
    });
  }

  // ---- Controls ----
  document.querySelectorAll('.pa-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activePA = btn.dataset.pa;
      document.querySelectorAll('.pa-btn').forEach(b => b.classList.toggle('active', b === btn));
      applyPA();
      refreshStatClients();
      renderTopList();
    });
  });

  document.querySelectorAll('.scope-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (scope === btn.dataset.scope) return;
      scope = btn.dataset.scope;
      document.querySelectorAll('.scope-toggle button').forEach(b => b.classList.toggle('active', b === btn));
      selected = null;
      const det = document.getElementById('detail');
      det.classList.add('empty');
      det.innerHTML = '<div class="empty-msg">Click any dot on the map<br>to see client details.</div>';
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === 'top'));
      showView('top');
      render();
    });
  });

  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b === btn));
      showView(btn.dataset.view);
    });
  });
  function showView(v) {
    document.getElementById('topList').style.display = v === 'top' ? 'block' : 'none';
    document.getElementById('detail').style.display = v === 'detail' ? 'block' : 'none';
  }

  render();
  document.getElementById('loading').classList.add('hidden');

  // Resize
  window.addEventListener('resize', () => {
    const box = node.getBoundingClientRect();
    projection.fitSize([box.width, box.height], statesGeo);
    statesLayer.selectAll('path').attr('d', path);
    meshPath.attr('d', path(stateMesh));
    bubbleLayer.selectAll('.city-bubble')
      .attr('cx', d => { const p = projection([d.lng, d.lat]); return p ? p[0] : -9999; })
      .attr('cy', d => { const p = projection([d.lng, d.lat]); return p ? p[1] : -9999; });
  });
}

init().catch(err => {
  document.getElementById('loading').textContent = 'Failed to load: ' + err.message;
  console.error(err);
});
</script>
</body>
</html>
