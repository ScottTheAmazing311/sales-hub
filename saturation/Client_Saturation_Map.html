<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Saturation Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  :root {
    --midnight: #0B0B2A;
    --tuxedo: #1C1C3A;
    --chartreuse: #D6FF3D;
    --sky: #6BCEE8;
    --flax: #F5D67E;
    --pearl: #F5F5F0;
    --pearl-dim: #E8E8E0;
    --ink: #0B0B2A;
    --muted: #6B6B7A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Mono', ui-monospace, monospace;
    background: var(--pearl);
    color: var(--ink);
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: 100vh;
    background: var(--pearl);
  }

  /* Map panel */
  .map-panel {
    position: relative;
    background:
      radial-gradient(circle at 20% 20%, rgba(214,255,61,0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(107,206,232,0.04) 0%, transparent 40%),
      var(--pearl);
    overflow: hidden;
  }
  .map-header {
    position: absolute;
    top: 24px;
    left: 32px;
    z-index: 5;
    pointer-events: none;
  }
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 38px;
    line-height: 0.95;
    color: var(--midnight);
    letter-spacing: -0.02em;
  }
  h1 .accent {
    background: var(--chartreuse);
    padding: 0 6px;
    margin-left: -2px;
  }
  .map-meta {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 24px;
    left: 32px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--pearl-dim);
    padding: 14px 16px;
    z-index: 5;
    font-size: 11px;
  }
  .legend-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot {
    border-radius: 50%;
    border: 1.5px solid var(--midnight);
  }
  .legend-label {
    color: var(--ink);
    font-size: 11px;
  }
  .legend-count {
    margin-left: auto;
    color: var(--muted);
    font-size: 10px;
  }

  /* SVG */
  svg.usmap {
    width: 100%;
    height: 100%;
    display: block;
  }
  .state {
    fill: #FFFFFF;
    stroke: #C8C8C0;
    stroke-width: 0.6;
    transition: fill 0.15s;
  }
  .state.has-clients {
    fill: #FAFAF5;
  }
  .state:hover {
    fill: #F0F0E8;
  }
  .city-bubble {
    cursor: pointer;
    transition: stroke-width 0.15s, transform 0.15s;
    transform-origin: center;
    transform-box: fill-box;
  }
  .city-bubble:hover {
    stroke-width: 2.5;
  }
  .city-bubble.selected {
    stroke: var(--midnight);
    stroke-width: 3;
  }

  /* Sidebar */
  .sidebar {
    background: var(--midnight);
    color: var(--pearl);
    border-left: 1px solid var(--tuxedo);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-track { background: var(--midnight); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--tuxedo); border-radius: 4px; }

  .sidebar-header {
    padding: 28px 28px 18px;
    border-bottom: 1px solid var(--tuxedo);
  }
  .sidebar-eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--chartreuse);
    margin-bottom: 8px;
  }
  .sidebar-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
    line-height: 1.1;
    color: var(--pearl);
  }
  .sidebar-stats {
    display: flex;
    gap: 24px;
    margin-top: 16px;
  }
  .stat {
    flex: 1;
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--chartreuse);
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
    margin-top: 4px;
  }

  /* Toggle */
  .view-toggle {
    display: flex;
    margin: 18px 28px 0;
    border: 1px solid var(--tuxedo);
    background: var(--tuxedo);
    padding: 3px;
  }
  .view-toggle button {
    flex: 1;
    background: transparent;
    border: none;
    color: rgba(245,245,240,0.6);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--chartreuse);
    color: var(--midnight);
    font-weight: 500;
  }

  /* Detail panel */
  .detail {
    padding: 24px 28px;
    flex: 1;
  }
  .detail.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .empty-msg {
    color: rgba(245,245,240,0.4);
    font-size: 12px;
    line-height: 1.6;
    max-width: 220px;
  }
  .detail-city {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    color: var(--pearl);
    margin-bottom: 4px;
  }
  .detail-state {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(245,245,240,0.5);
    text-transform: uppercase;
  }
  .detail-meta {
    display: flex;
    gap: 16px;
    margin-top: 18px;
    padding: 14px 0;
    border-top: 1px solid var(--tuxedo);
    border-bottom: 1px solid var(--tuxedo);
  }
  .meta-item {
    flex: 1;
  }
  .meta-num {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--pearl);
    line-height: 1;
  }
  .meta-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
    margin-top: 4px;
  }
  .saturation-pill {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    border: 1px solid currentColor;
  }
  .clients-header {
    margin-top: 24px;
    margin-bottom: 12px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,245,240,0.5);
  }
  .client-list {
    list-style: none;
  }
  .client-list li {
    padding: 10px 0;
    border-bottom: 1px solid rgba(245,245,240,0.08);
    font-size: 12px;
    color: var(--pearl);
    line-height: 1.4;
  }
  .client-list li:last-child { border-bottom: none; }

  /* Top cities list */
  .top-list {
    padding: 0 28px 24px;
    flex: 1;
    overflow-y: auto;
  }
  .top-list::-webkit-scrollbar { width: 6px; }
  .top-list::-webkit-scrollbar-thumb { background: var(--tuxedo); }

  .top-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--tuxedo);
    cursor: pointer;
    transition: background 0.15s;
    margin: 0 -8px;
    padding-left: 8px;
    padding-right: 8px;
  }
  .top-row:hover {
    background: var(--tuxedo);
  }
  .top-rank {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(245,245,240,0.4);
  }
  .top-city {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--pearl);
  }
  .top-state {
    font-size: 10px;
    color: rgba(245,245,240,0.5);
    margin-left: 4px;
  }
  .top-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--chartreuse);
    font-weight: 500;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--midnight);
    color: var(--pearl);
    padding: 8px 12px;
    font-size: 11px;
    border: 1px solid var(--chartreuse);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-city {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 600;
  }
  .tooltip-meta {
    color: rgba(245,245,240,0.6);
    font-size: 10px;
    margin-top: 2px;
  }

  /* Loading */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--pearl);
    z-index: 20;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .loading.hidden { display: none; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 60vh 40vh; }
    .sidebar { border-left: none; border-top: 1px solid var(--tuxedo); }
  }
</style>
</head>

    <div class="view-toggle">

    <div id="topList" class="top-list"></div>
    <div id="detail" class="detail empty" style="display:none">
      <div class="empty-msg">Click any city dot on the map<br>to see client details.</div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

ients":["Cava Law Firm"]},{"city":"Springfield","state":"MO","key":"Springfield, MO","lat":37.21533,"lng":-93.29824,"count":1,"saturation":"Low","clients":["Hall Ansley, P.C."]},{"city":"Springfield","state":"OR","key":"Springfield, OR","lat":44.04624,"lng":-123.02203,"count":1,"saturation":"Low","clients":["Thorp & Co Family Law"]},{"city":"Steamboat Springs","state":"CO","key":"Steamboat Springs, CO","lat":40.48498,"lng":-106.83171,"count":1,"saturation":"Low","clients":["The Brown Law Firm, LLC"]},{"city":"Stevens Point","state":"WI","key":"Stevens Point, WI","lat":44.52358,"lng":-89.57456,"count":1,"saturation":"Low","clients":["Anderson O'Brien"]},{"city":"Syosset","state":"NY","key":"Syosset, NY","lat":40.82621,"lng":-73.50207,"count":1,"saturation":"Low","clients":["Tucker Lawyers PC"]},{"city":"Tacoma","state":"WA","key":"Tacoma, WA","lat":47.25288,"lng":-122.44429,"count":1,"saturation":"Low","clients":["Bridges ADR (Dickson)"]},{"city":"Thibodaux","state":"LA","key":"Thibodaux, LA","lat":29.79552,"lng":-90.82288,"count":1,"saturation":"Low","clients":["Ory Law Group"]},{"city":"Topeka","state":"KS","key":"Topeka, KS","lat":39.04833,"lng":-95.67804,"count":1,"saturation":"Low","clients":["Palmer Law Group"]},{"city":"White Plains","state":"NY","key":"White Plains, NY","lat":41.03399,"lng":-73.76291,"count":1,"saturation":"Low","clients":["Law Offices of Jason B. Kessler, PC"]},{"city":"Williamsville","state":"NY","key":"Williamsville, NY","lat":42.96369,"lng":-78.73782,"count":1,"saturation":"Low","clients":["William Mattar Law Offices"]},{"city":"Wilmington","state":"NC","key":"Wilmington, NC","lat":34.23556,"lng":-77.94604,"count":1,"saturation":"Low","clients":["Greg Jones Law"]},{"city":"Woodridge","state":"IL","key":"Woodridge, IL","lat":41.74697,"lng":-88.05034,"count":1,"saturation":"Low","clients":["Wolfe & Stec, Ltd."]},{"city":"Yakima","state":"WA","key":"Yakima, WA","lat":46.60207,"lng":-120.5059,"count":1,"saturation":"Low","clients":["Kapuza Lighty Accident Injury Lawyers"]}]
;

// Saturation → color (matching the Excel report)
const SAT_COLOR = {
  'Very High': '#FFB3B3',
  'High':      '#FFD9B3',
  'Moderate':  '#FFF4CC',
  'Low':       '#D6E4F5',
};
const SAT_BORDER = {
  'Very High': '#C44',
  'High':      '#C97',
  'Moderate':  '#A95',
  'Low':       '#578',
};

// Stats
const totalClients = CITIES.reduce((s,c) => s + c.count, 0);
const states = new Set(CITIES.map(c => c.state));
document.getElementById('metaLine').textContent =
  `${totalClients} clients · ${CITIES.length} cities · ${states.size} states`;
document.querySelectorAll('.stat-num')[0].textContent = totalClients;
document.querySelectorAll('.stat-num')[1].textContent = CITIES.length;
document.querySelectorAll('.stat-num')[2].textContent = states.size;

// Bubble radius scale
const maxCount = d3.max(CITIES, c => c.count);
const rScale = d3.scaleSqrt().domain([1, maxCount]).range([3.5, 18]);

// Fetch US topojson
const topoUrl = 'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json';

async function init() {
  const us = await fetch(topoUrl).then(r => r.json());
  const states = topojson.feature(us, us.objects.states);
  const stateMesh = topojson.mesh(us, us.objects.states, (a,b) => a !== b);

  const svg = d3.select('#usmap');
  const node = svg.node();
  const { width, height } = node.getBoundingClientRect();

  const projection = d3.geoAlbersUsa().fitSize([width, height], states);
  const path = d3.geoPath(projection);

  // Identify states with clients
  const stateAbbrToName = {
    'AL':'Alabama','AK':'Alaska','AZ':'Arizona','AR':'Arkansas','CA':'California',
    'CO':'Colorado','CT':'Connecticut','DE':'Delaware','FL':'Florida','GA':'Georgia',
    'HI':'Hawaii','ID':'Idaho','IL':'Illinois','IN':'Indiana','IA':'Iowa','KS':'Kansas',
    'KY':'Kentucky','LA':'Louisiana','ME':'Maine','MD':'Maryland','MA':'Massachusetts',
    'MI':'Michigan','MN':'Minnesota','MS':'Mississippi','MO':'Missouri','MT':'Montana',
    'NE':'Nebraska','NV':'Nevada','NH':'New Hampshire','NJ':'New Jersey','NM':'New Mexico',
    'NY':'New York','NC':'North Carolina','ND':'North Dakota','OH':'Ohio','OK':'Oklahoma',
    'OR':'Oregon','PA':'Pennsylvania','RI':'Rhode Island','SC':'South Carolina',
    'SD':'South Dakota','TN':'Tennessee','TX':'Texas','UT':'Utah','VT':'Vermont',
    'VA':'Virginia','WA':'Washington','WV':'West Virginia','WI':'Wisconsin','WY':'Wyoming',
    'DC':'District of Columbia'
  };
  const statesWithClients = new Set([...new Set(CITIES.map(c => c.state))].map(s => stateAbbrToName[s]));

  // States
  svg.append('g')
    .selectAll('path')
    .data(states.features)
    .join('path')
    .attr('class', d => 'state' + (statesWithClients.has(d.properties.name) ? ' has-clients' : ''))
    .attr('d', path);

  // State borders mesh
  svg.append('path')
    .attr('d', path(stateMesh))
    .attr('fill', 'none')
    .attr('stroke', '#C8C8C0')
    .attr('stroke-width', 0.6)
    .attr('stroke-linejoin', 'round');

  // Project city points
  const points = CITIES.map(c => {
    const p = projection([c.lng, c.lat]);
    return p ? { ...c, x: p[0], y: p[1] } : null;
  }).filter(Boolean);

  // Draw smallest first so largest sit on top (largest are most clickable)
  const drawn = [...points].sort((a,b) => a.count - b.count);

  const tooltip = d3.select('#tooltip');
  const bubbles = svg.append('g')
    .selectAll('circle')
    .data(drawn, d => d.key)
    .join('circle')
    .attr('class', 'city-bubble')
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('r', d => rScale(d.count))
    .attr('fill', d => SAT_COLOR[d.saturation])
    .attr('stroke', d => SAT_BORDER[d.saturation])
    .attr('stroke-width', 1.5)
    .attr('fill-opacity', 0.85)
    .on('mouseenter', (event, d) => {
      tooltip.classed('visible', true)
        .html(`<div class="tooltip-city">${d.key}</div>
               <div class="tooltip-meta">${d.count} client${d.count===1?'':'s'} · ${d.saturation}</div>`);
    })
    .on('mousemove', (event) => {
      tooltip.style('left', (event.pageX + 14) + 'px')
             .style('top', (event.pageY + 14) + 'px');
    })
    .on('mouseleave', () => tooltip.classed('visible', false))
    .on('click', (event, d) => selectCity(d));

  // Top cities list
  const top = [...CITIES].sort((a,b) => b.count - a.count);
  const topList = d3.select('#topList');
  topList.selectAll('div.top-row')
    .data(top)
    .join('div')
    .attr('class', 'top-row')
    .html((d,i) => `
      <div class="top-rank">${String(i+1).padStart(2,'0')}</div>
      <div><span class="top-city">${d.city}</span><span class="top-state">, ${d.state}</span></div>
      <div class="top-count">${d.count}</div>
    `)
    .on('click', (event, d) => selectCity(d));

  // Selection
  let selected = null;
  function selectCity(d) {
    selected = d;
    svg.selectAll('.city-bubble').classed('selected', x => x.key === d.key);
    // Switch to detail view
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === 'detail'));
    showView('detail');

    const det = document.getElementById('detail');
    det.classList.remove('empty');
    const satColor = SAT_COLOR[d.saturation];
    const satBorder = SAT_BORDER[d.saturation];
    det.innerHTML = `
      <div class="detail-city">${d.city}</div>
      <div class="detail-state">${d.state}</div>
      <span class="saturation-pill" style="color:${satColor};border-color:${satColor};background:${satColor}22">${d.saturation}</span>
      <div class="detail-meta">
        <div class="meta-item"><div class="meta-num">${d.count}</div><div class="meta-label">Clients</div></div>
        <div class="meta-item"><div class="meta-num">#${top.findIndex(c=>c.key===d.key)+1}</div><div class="meta-label">Rank</div></div>
      </div>
      <div class="clients-header">Client Roster</div>
      <ul class="client-list">
        ${d.clients.map(c => `<li>${c}</li>`).join('')}
      </ul>
    `;
  }

  // View toggle
  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b === btn));
      showView(btn.dataset.view);
    });
  });
  function showView(v) {
    document.getElementById('topList').style.display = v === 'top' ? 'block' : 'none';
    document.getElementById('detail').style.display = v === 'detail' ? 'flex' : 'none';
    if (v === 'detail') {
      document.getElementById('detail').style.display = 'block';
    }
  }

  document.getElementById('loading').classList.add('hidden');

  // Resize
  window.addEventListener('resize', () => {
    const { width, height } = node.getBoundingClientRect();
    projection.fitSize([width, height], states);
    svg.selectAll('path.state').attr('d', path);
    points.forEach(p => {
      const np = projection([p.lng, p.lat]);
      if (np) { p.x = np[0]; p.y = np[1]; }
    });
    svg.selectAll('.city-bubble').attr('cx', d => d.x).attr('cy', d => d.y);
  });
}

init().catch(err => {
  document.getElementById('loading').textContent = 'Failed to load map: ' + err.message;
  console.error(err);
});
</script>
